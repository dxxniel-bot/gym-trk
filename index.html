<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline' 'wasm-unsafe-eval' https://cdn.jsdelivr.net; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src https://fonts.gstatic.com; img-src 'self' data: blob:; connect-src 'self' https://*.openfoodfacts.org https://cdn.jsdelivr.net https://tessdata.projectnaptha.com; worker-src 'self' blob:; object-src 'none'; base-uri 'self'" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
<title>gym//TRK</title>
<link rel="manifest" href="manifest.json"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black"/>
<meta name="apple-mobile-web-app-title" content="gym//TRK"/>
<meta name="theme-color" content="#000"/>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;700;800&display=swap" rel="stylesheet" />
<style>
  :root{
    --bg:#000; --frame:#000; --fg:#f3f3f4;
    --o60:rgba(243,243,244,.66); --o50:rgba(243,243,244,.56); --o40:rgba(243,243,244,.5);
    --o35:rgba(243,243,244,.46); --o30:rgba(243,243,244,.4); --o20:rgba(243,243,244,.26);
    --o12:rgba(243,243,244,.1); --o10:rgba(243,243,244,.06);
    --faint:#3a3a3e; --line:rgba(243,243,244,.08); --track:#191920; --fill:#f3f3f4; --abort:rgba(190,110,110,.55);
    --card:#0d0d10; --card2:#16161c; --border:rgba(243,243,244,.09); --radius:16px; --sheet-bg:#0a0a0c;
    --good:#46c98b; --bad:#e5675c; --warn:#e3b34f; --info:#6aa6ff;
    --good-glow:rgba(70,201,139,.5); --bad-glow:rgba(229,103,92,.5); --warn-glow:rgba(227,179,79,.45);
    /* liquid glass (chrome flotante; neutro/acromático) + texto sobre --fill */
    --glass-bg:rgba(14,14,17,.55); --glass-bg-strong:rgba(14,14,17,.72); --glass-blur:18px; --glass-sat:1.7;
    --glass-edge:rgba(243,243,244,.14); --glass-edge-lo:rgba(243,243,244,.06); --glass-shadow:0 8px 30px rgba(0,0,0,.55); --glass-ring:rgba(243,243,244,.1);
    --on-fill:#000;
    /* radius system: pill / control / card / sheet (controls=12 unifica botones+inputs) */
    --r-ctl:12px; --r-pill:999px; --r-sm:2px;
    /* page-rhythm knobs (ajustables en vivo con ?design) */
    --sp-py:22px; --sp-px:18px; --sp-card:15px; --sp-gap:12px; --sp-section:14px; --sp-field:12px; --sp-row:12px; --sp-sheet:18px; --r-sheet:22px;
    /* spacing scale (grid 4px; para spacings de componente) */
    --s1:2px; --s2:4px; --s3:8px; --s4:12px; --s5:16px; --s6:24px;
    /* type scale (una sola escala) — display 22 · section 16 · body 13 · sm 12 · meta 11 · xs 10 · caption 9 */
    --t-display:22px; --t-section:16px; --t-body:13px; --t-sm:12px; --t-meta:11px; --t-xs:10px; --t-caption:9px;
  }
  *{margin:0;padding:0;box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
  :focus{outline:none;}
  :focus-visible{outline:1.5px solid var(--fg); outline-offset:2px;}
  @media (prefers-reduced-motion:reduce){ *{transition-duration:.01ms!important; animation-duration:.01ms!important; scroll-behavior:auto!important;} }
  html{height:100%;}
  body{background:var(--bg); color:var(--fg);
    font-family:"JetBrains Mono",ui-monospace,Menlo,monospace;
    position:fixed; inset:0; overflow:hidden; overscroll-behavior:none;
    display:flex; flex-direction:column; align-items:center; justify-content:center;
    -webkit-font-smoothing:antialiased; touch-action:manipulation;
    -webkit-user-select:none; user-select:none;}
  .frame{position:relative; width:393px; height:852px; max-width:100%; max-height:100%; background:var(--frame); overflow:hidden;
    border-radius:2px; box-shadow:0 0 0 1px #000,0 24px 60px rgba(0,0,0,.6);
    display:flex; flex-direction:column;}
  /* on a real phone: frame fills the screen, no floating card */
  @media (max-width:440px){ body{display:block;} .frame{width:100%; height:100%; max-height:none; border-radius:0; box-shadow:none;} }
  input,select,textarea{font-size:16px; -webkit-user-select:text; user-select:text;}
  .scroll{flex:1; overflow-y:auto; -webkit-overflow-scrolling:touch; overscroll-behavior-y:contain; padding:var(--sp-py) var(--sp-px) calc(84px + env(safe-area-inset-bottom));}
  .scroll::-webkit-scrollbar{width:6px} .scroll::-webkit-scrollbar-thumb{background:var(--o10)}
  input,select,button{font-family:inherit;}

  /* status bar */
  .status{display:flex; justify-content:space-between; align-items:flex-start; font-size:10px; color:var(--o50);}
  .status .uname{font-weight:800; font-size:12px; color:var(--fg);}
  .status .back{display:inline-block; margin-top:4px; font-size:var(--t-meta); color:var(--o60); border:1px solid var(--o20); padding:10px 12px; cursor:pointer; border-radius:var(--r-ctl);}
  .status .center{text-align:center; line-height:1.4;}
  .status .streak{font-size:12px; font-weight:800; color:var(--o50);}
  .status b{color:var(--o60); font-weight:500;}

  .rule{border:0; border-top:1px solid var(--line); margin:18px 0;}

  /* rotation */
  .rot{display:flex; justify-content:space-between; align-items:center; margin:14px 0 10px;}
  .rot .lbl{font-size:10px; color:var(--o60); letter-spacing:.5px;} .rot .n{font-size:10px; color:var(--o40);}
  .segs{display:flex; gap:3px; margin-bottom:13px;} .segs i{flex:1; height:4px; background:var(--track); cursor:pointer;} .segs i.on{background:var(--fill);}
  .rot .arrow{cursor:pointer; color:var(--o60); padding:0 5px;}
  .ctrls{display:flex; gap:14px; font-size:10px; margin-bottom:22px;} .ctrls a{color:var(--o50); cursor:pointer; padding:12px 6px; margin:-12px -6px;}

  /* section header (stacked label + name) */
  .whdr{display:grid; grid-template-columns:auto 1fr; column-gap:var(--s3); row-gap:3px; align-items:baseline; margin-bottom:var(--s3);}
  .whdr .l1,.whdr .l2{grid-column:1; justify-self:end; text-align:right; font-size:var(--t-section); font-weight:800; line-height:1; letter-spacing:2px; color:var(--o50);}
  .whdr .l1{grid-row:1;} .whdr .l2{grid-row:2;} .whdr .l1 .s{color:var(--o50);}
  .whdr .wname{grid-column:2; grid-row:1; font-size:var(--t-display); font-weight:800; letter-spacing:-.3px; line-height:1;}
  .whdr .wmeta{grid-column:2; grid-row:2; font-size:var(--t-caption); color:var(--o50); line-height:1; letter-spacing:.2px;}
  .wgym{text-align:center; font-size:10px; color:var(--o40); margin-top:8px;}

  .section{display:flex; align-items:baseline; justify-content:space-between; margin-bottom:var(--sp-section);}
  .section .h{font-size:var(--t-section); font-weight:800;} .section .h .s{color:var(--o50);}
  .section .meta{font-size:11px; color:var(--o50); cursor:pointer; padding:6px 4px;}

  /* CTA buttons */
  .cta{margin-top:18px;}
  /* canonical button roles — primary 48px r13 · secondary 44px r11 (≥44px tap targets) */
  .start{display:block; width:100%; text-align:center; background:var(--fill); color:var(--on-fill); font-weight:600; font-size:var(--t-body); height:48px; padding:0; letter-spacing:.3px; border:0; border-radius:var(--r-ctl); cursor:pointer;}
  .secondary{display:flex; gap:10px; margin-top:10px;}
  .secondary .b{flex:1; text-align:center; font-size:var(--t-sm); color:var(--fg); border:1px solid var(--border); height:44px; padding:0; background:transparent; cursor:pointer; letter-spacing:.3px; border-radius:var(--r-ctl);}
  .secondary .b:active{background:var(--card2);}

  /* prev + stats lists */
  .line{display:flex; align-items:baseline; gap:10px; font-size:var(--t-meta); padding:3px 0;}
  .line .k{color:var(--o60);} .line .dots{flex:1; border-bottom:1px dotted var(--line); transform:translateY(-3px);} .line .v{color:var(--fg);}
  .line.stat .k{color:var(--o50);} .line.stat .v{font-weight:700;}
  .vrow{margin-bottom:11px;} .vtop{display:flex;justify-content:space-between;align-items:baseline;font-size:11px;margin-bottom:5px;} .vm{color:var(--fg);} .vn{color:var(--o50);font-size:10px;} .vd{color:var(--o40);}
  .vst{font-size:8px;padding:0 4px;border:.5px solid var(--o20);margin-left:2px;} .vst.under{color:var(--o40);} .vst.optimal{color:var(--fill);border-color:var(--o40);} .vst.high{color:var(--warn);border-color:var(--warn);} .vst.over{color:var(--bad);border-color:var(--bad);}
  .vbar{position:relative;height:3px;background:var(--track);} .vbar>i{display:block;height:100%;background:var(--fill);} .vbar .mev,.vbar .mav{position:absolute;top:-1px;width:1px;height:5px;background:var(--o40);}
  .submeta{font-size:10px; color:var(--o40); padding-top:4px;}
  .rowend{display:flex; justify-content:space-between; align-items:baseline; margin-top:12px; font-size:10px; color:var(--o50);} .rowend .view{color:var(--o60); cursor:pointer;}

  /* macros rings */
  .hero{width:100%; background:none; border:0; color:inherit; font:inherit; display:flex; flex-direction:column; align-items:center; cursor:pointer;}
  .ring{position:relative;} .ring svg{display:block; width:100%; height:100%;}
  .ring-track{fill:none; stroke:var(--track); transition:stroke .28s ease;} .ring-fill{fill:none; stroke:var(--fill); stroke-linecap:round; transition:stroke-dasharray .32s ease, stroke .28s ease;}
  .ring-center{position:absolute; inset:0; display:flex; flex-direction:column; align-items:center; justify-content:center; line-height:1;}
  .ring.lg{width:132px; height:132px;} .ring.lg .ring-track,.ring.lg .ring-fill{stroke-width:1.4;} .ring.lg .num{font-size:26px; font-weight:800; letter-spacing:-1px;} .ring.lg .of{font-size:10px; color:var(--o40); margin-top:6px;}
  .ring.md{width:72px; height:72px;} .ring.md .ring-track,.ring.md .ring-fill{stroke-width:1.7;} .ring.md .num{font-size:13px; font-weight:700;}
  .hero-meta{margin-top:13px; font-size:10px; color:var(--o40); display:flex; gap:8px; align-items:center;} .hero-meta .left{color:var(--o60);} .chev{font-size:9px; color:var(--faint); transition:transform .2s;} .hero.open .chev{transform:rotate(180deg);}
  .rings{display:flex; justify-content:space-between; padding:0 4px;} .cell{display:flex; flex-direction:column; align-items:center; text-align:center; flex:1;}
  .cap{font-size:10px; color:var(--fg); margin-top:9px;} .sub{font-size:9px; color:var(--o40); margin-top:2px;}
  .cell{cursor:pointer;}
  /* remaining mode: same theme/colors — only WHICH arc is filled inverts (filled arc = remaining, drawn from the end) */
  .ring-fill{transition:stroke-dasharray .32s ease, stroke-dashoffset .32s ease, stroke .28s ease;}
  .cell .sub{transition:color .25s;} .cell .cap{transition:color .25s;}
  .grp-label{font-size:9px; color:var(--o50); letter-spacing:1.5px; margin-bottom:14px;}
  /* progress dashboard tiles (área Progreso · layout Diseño) */
  .pfeat{background:var(--card); border:1px solid var(--border); border-radius:var(--radius); padding:var(--sp-card); margin-top:14px;}
  .pfl{font-size:9px; color:var(--o40); letter-spacing:1.5px; text-transform:uppercase; margin-bottom:8px;}
  .pfv{font-size:14px; font-weight:700; line-height:1.35;} .pfv .up{color:var(--good);} .pfv .dn{color:var(--bad);}
  .pwk{display:flex; gap:6px; margin-top:12px;} .pwd{flex:1; height:5px; border-radius:3px; background:var(--track);} .pwd.on{background:var(--good);}
  .pgrid{display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-top:11px;}
  .ptile.tap{cursor:pointer; transition:transform .1s ease, opacity .1s ease;}
  .ptile.tap:active{transform:scale(.98); opacity:.85;}
  .ptchev{font-size:14px; color:var(--o30); margin-left:6px; line-height:1;}
  .pthrow{background:var(--card); border:1px solid var(--border); border-radius:var(--radius); padding:var(--sp-card); margin-top:12px;}
  .pthl{font-size:9px; color:var(--o40); letter-spacing:1.5px; text-transform:uppercase; margin-bottom:10px;} .pthl span{color:var(--o30); letter-spacing:.5px;}
  .tbrow{display:flex; align-items:baseline; justify-content:space-between; gap:10px; padding:4px 0; font-size:13px;}
  .tbk{color:var(--o50); font-size:11px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis;}
  .tbv{font-weight:700; white-space:nowrap;} .tbv i{font-style:normal; color:var(--o40); font-size:10px; font-weight:400; margin-left:2px;} .tbv b{font-weight:700; margin-left:5px;}
  .tba{color:var(--o35); margin:0 2px;}
  .lpr{font-size:10px; font-weight:800; color:var(--good); border:1px solid var(--good); border-radius:4px; padding:1px 5px; letter-spacing:1px; vertical-align:middle; margin-left:6px;}
  .mdetail-wrap .sheet{max-height:88vh; overflow-y:auto;}
  .mdetail{padding:0;}
  .mdhd{display:flex; align-items:flex-end; justify-content:space-between; gap:8px; margin-bottom:14px;}
  .mdhd h3{margin:0;}
  .mdlog{font-size:11px; color:var(--o60); cursor:pointer; text-decoration:none; padding:4px 0;}
  .mdlog:active{color:var(--fg);}
  .mdtabs{display:flex; gap:0; background:var(--o12); border-radius:var(--radius); padding:3px; margin-bottom:18px;}
  .mdtabs span{flex:1; text-align:center; padding:7px 0; font-size:11px; color:var(--o50); cursor:pointer; border-radius:calc(var(--radius) - 3px); letter-spacing:.5px; font-weight:600;}
  .mdtabs span.on{background:var(--card); color:var(--fg);}
  .mdval{font-size:36px; font-weight:800; letter-spacing:-.5px; margin-bottom:3px; line-height:1.05;}
  .mdmeta{font-size:11px; color:var(--o50); margin-bottom:6px;}
  .mdgood{color:var(--good);} .mdbad{color:var(--bad);} .mdflat{color:var(--o50);}
  .mdstats{margin-top:14px; border-top:.5px solid var(--o12); padding-top:8px;}
  .mdline{display:flex; align-items:baseline; padding:5px 0; font-size:var(--t-sm);}
  .mdk{color:var(--o60); white-space:nowrap;}
  .mddots{flex:1; border-bottom:1px dotted var(--o20); margin:0 8px; position:relative; top:-3px;}
  .mdv{color:var(--fg); white-space:nowrap; text-align:right;}
  .mdsub{color:var(--o40); font-size:10px; margin-left:5px;}
  .ptile{background:var(--card); border:1px solid var(--border); border-radius:var(--radius); padding:var(--s4); min-width:0; overflow:hidden;}
  .ptile .ptlh{display:flex; align-items:center; justify-content:space-between; gap:6px;}
  .plbl{font-size:9px; color:var(--o40); letter-spacing:1px; text-transform:uppercase; margin-bottom:7px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis;}
  .ptlh .plbl{margin-bottom:0;}
  .ptla{font-size:9px; color:var(--o40); letter-spacing:.5px; cursor:pointer; white-space:nowrap;} .ptla:active{color:var(--fg);}
  .pval{font-size:23px; font-weight:800; letter-spacing:-.5px; line-height:1; margin-top:1px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis;}
  .pval span{font-size:11px; color:var(--o40); font-weight:400; margin-left:3px; letter-spacing:0;}
  .pst{font-size:11px; font-weight:700; margin-top:5px;} .pst.good{color:var(--good);} .pst.bad{color:var(--bad);} .pst.flat{color:var(--o40); font-weight:400;}
  .pst .lk{color:var(--o40); font-weight:400; text-decoration:underline; cursor:pointer;}
  .prng{font-size:10px; letter-spacing:.5px; white-space:nowrap;} .prng span{cursor:pointer; padding:0 3px;}
  .ptile svg{margin:7px 0 0 !important;}
  .mrow{display:grid; grid-template-columns:78px 1fr auto; align-items:center; column-gap:14px; margin-top:16px; font-size:11px;}
  .mrow:first-of-type{margin-top:0;} .mrow .ml{color:var(--o50);} .mrow .mv{color:var(--o60); font-size:10px; white-space:nowrap;} .mrow .mv .g{color:var(--o40);}
  .bar{height:3px; background:var(--track);} .bar>i{display:block; height:100%; background:var(--fill);}
  .pill{font-size:9px; color:var(--o50); border:1px solid var(--faint); padding:1px 5px; margin-left:6px;}
  .pill.good{color:var(--good); border-color:var(--good);} .pill.over{color:var(--bad); border-color:var(--bad);}

  /* food log — grid 3-col: name | macros(76px) | kcal(40px) */
  .grp{margin-bottom:14px;}
  .ghead,.item{display:grid; grid-template-columns:1fr 76px 40px; column-gap:8px; align-items:baseline; padding:0 0 0 22px; font-size:10px; margin-bottom:0;}
  .ghead{color:var(--o50); margin-bottom:7px; padding-bottom:0;}
  .ghead .hash{color:var(--faint);}
  .ghead .gmac{color:var(--o40); font-size:9px; text-align:right;}
  .ghead .gkc{color:var(--fg); font-size:13px; font-weight:800; text-align:right;}
  .item{padding:var(--sp-row) 0 var(--sp-row) 22px; font-size:11px; cursor:pointer;}
  .item:active{background:var(--o10);}
  .item .nm{color:var(--o60); overflow:hidden; text-overflow:ellipsis; white-space:nowrap;}
  .item .nm .q{color:var(--fg); font-weight:700; margin-right:6px;} .item .nm .br{color:var(--o35); font-size:9px; margin-left:4px;}
  .item .macq{color:var(--o40); font-size:9px; text-align:right; white-space:nowrap;}
  .item .kc{color:var(--o50); font-size:10px; font-weight:400; text-align:right;}
  .item.exp{background:var(--o10);}
  /* session history — agrupado por mes, fila de 2 líneas (reusa .grp) */
  .hmon{font-size:var(--t-caption); color:var(--o40); letter-spacing:1.5px; text-transform:uppercase; margin:var(--s4) 0 var(--s2) 2px;}
  .hmon:first-of-type{margin-top:var(--s2);}
  .hrow{display:flex; align-items:center; justify-content:space-between; gap:var(--s4); padding:var(--s4) 0; cursor:pointer; border-bottom:1px solid var(--border);}
  .grp .hrow:last-child{border-bottom:0;}
  .hrow:active{background:var(--o10);}
  .hrow .hL{min-width:0;}
  .hrow .hnm{font-size:var(--t-body); font-weight:700; color:var(--fg); line-height:1.2; overflow:hidden; text-overflow:ellipsis; white-space:nowrap;}
  .hrow .hmeta{font-size:var(--t-meta); color:var(--o40); margin-top:3px;}
  .hrow .hR{display:flex; align-items:center; gap:var(--s3); flex:0 0 auto;}
  .hrow .hday{font-size:var(--t-meta); color:var(--o50); white-space:nowrap;}
  .hrow .hagg{font-size:var(--t-meta); white-space:nowrap;}
  .hrow .hchev{color:var(--o30); font-size:var(--t-body); line-height:1;}
  /* inline meal detail under a tapped log item */
  .mdetail{padding:8px 10px 10px 22px; margin-bottom:2px; border-left:2px solid var(--o20); animation:mdslide .2s ease;}
  @keyframes mdslide{from{opacity:0;transform:translateY(-4px)}to{opacity:1;transform:none}}
  .mdtop{font-size:10px; color:var(--o60); margin-bottom:7px;}
  .mdgrid{display:grid; grid-template-columns:1fr 1fr; gap:3px 16px;}
  .mdr{display:flex; justify-content:space-between; font-size:10px;}
  .mdk{color:var(--o50);} .mdv{color:var(--fg);}
  .mdacts{display:flex; gap:16px; margin-top:9px;} .mdacts a{font-size:10px; color:var(--o50); cursor:pointer; text-decoration:underline;}
  .mgd{margin-bottom:6px; padding-top:2px;} .ghead.exp .gkc{color:var(--fg);}
  .fab{position:fixed; right:18px; bottom:calc(76px + env(safe-area-inset-bottom)); width:56px; height:56px; border-radius:50%; background:var(--fg); color:var(--on-fill); border:none; font-size:30px; font-weight:300; line-height:0; display:flex; align-items:center; justify-content:center; box-shadow:0 3px 16px rgba(0,0,0,.55); z-index:4; cursor:pointer;}
  .fab:active{transform:scale(.93);}
  /* add menu popover — emerges from FAB (bottom-right), stacks up */
  .addscrim{position:fixed; inset:0; z-index:5;}
  .addpop{position:fixed; right:18px; bottom:calc(140px + env(safe-area-inset-bottom)); z-index:6; display:flex; flex-direction:column; align-items:flex-end; gap:8px;}
  .addpop .api{background:var(--fill); color:var(--on-fill); border:none; border-radius:999px; padding:11px 18px; font-family:inherit; font-size:13px; font-weight:600; box-shadow:0 3px 14px rgba(0,0,0,.5); cursor:pointer; opacity:0; transform:translateY(10px) scale(.9); transition:opacity .18s ease, transform .22s cubic-bezier(.2,1.2,.4,1); white-space:nowrap;}
  .addpop.show .api{opacity:1; transform:none;}
  .addpop.show .api:nth-child(1){transition-delay:.0s;} .addpop.show .api:nth-child(2){transition-delay:.04s;} .addpop.show .api:nth-child(3){transition-delay:.08s;} .addpop.show .api:nth-child(4){transition-delay:.12s;}

  /* workout sets table */
  .wprog{height:2px; background:var(--o10); margin:8px 0 0;} .wprog>i{display:block; height:100%; background:var(--fill);}
  .mgroup{margin-top:26px;} .mhead{font-size:11px; color:var(--o50); margin-bottom:15px;}
  .mbody{border-left:1px solid var(--o12); padding-left:14px; margin-left:4px;}

let _saveBakT=0;
function save(){ try{ const s=JSON.stringify(db); localStorage.setItem(LS_KEY,s);

  const now=performance.now(); if(now-_saveBakT>4000){ _saveBakT=now; try{localStorage.setItem(LS_BACKUP,s);}catch(e){} }

function dbMass(o){ try{ const m=Object.values((o&&o.meals)||{}).reduce((n,a)=>n+(a?a.length:0),0); return m+(((o&&o.sessions)||[]).length)+(((o&&o.foods)||[]).length)+Object.keys((o&&o.bodyweight)||{}).length+Object.keys((o&&o.steps)||{}).length+Object.keys((o&&o.sleep)||{}).length; }catch(_){ return 0; } }

function lastLoggedSets(name,uni){ const key=(name||'').toLowerCase().trim(); let best=null,bd=''; (db.sessions||[]).forEach(s=>{ if(s.type==='rest')return; (s.exercises||[]).forEach(e=>{ if((e.name||'').toLowerCase().trim()!==key||!e.sets||!e.sets.length)return; const eUni=e.sets.some(x=>x.side); if(!!uni!==eUni)return; if(s.date>=bd){ bd=s.date; best=e.sets; } }); }); return best; }

function e1rmTrend(){ // best Epley e1RM per exercise, this week vs prior week
  const wk=(off)=>{ const now=new Date(); const a=new Date(now); a.setDate(now.getDate()-7*off-7); const b=new Date(now); b.setDate(now.getDate()-7*off); const ai=todayISO(a),bi=todayISO(b); const best={};
    db.sessions.forEach(s=>{ if(s.type==='rest'||s.date<ai||s.date>=bi)return; (s.exercises||[]).forEach(e=>{ (e.sets||[]).forEach(st=>{ const w=parseFloat(st.w)||0,r=parseFloat(st.r)||0; if(w&&r){ const e1=w*(1+repsToFailure(r,st.rir)/30); if(!best[e.name]||e1>best[e.name])best[e.name]=e1; } }); }); }); return best; };
  const cur=wk(0),prev=wk(1); const out=[];
  Object.keys(cur).forEach(k=>{ out.push({name:k,cur:cur[k],prev:prev[k]||null}); });
  return out.sort((a,b)=>b.cur-a.cur).slice(0,3);
}
function topLift(){ const m={}; db.sessions.forEach(s=>{if(s.type==='rest')return;(s.exercises||[]).forEach(e=>{let v=0;(e.sets||[]).forEach(st=>v+=(parseFloat(st.w)||0)*(parseFloat(st.r)||0)); m[e.name]=(m[e.name]||0)+v;});}); let best='—',bv=-1; for(const k in m){if(m[k]>bv){bv=m[k];best=k;}} return best; }
function kfmt(n){ return n>=1000? (n/1000).toFixed(1)+'k' : String(Math.round(n)); }
function elapsedStr(ms){ if(!ms)return''; const s=Math.max(0,Math.round((Date.now()-ms)/1000)); const h=Math.floor(s/3600),m=Math.floor(s%3600/60); return h?h+'h '+pad(m)+'m':m+'m'; }

// Per-set score = Epley e1RM × intensityFactor — STRENGTH CAPACITY within the hypertrophy zone.
//   e1RM = w × (1 + reps_to_failure/30) — same weight/reps with LOWER RIR → lower e1RM (you got weaker / harder day).
//   intensityFactor — filters out non-productive loads (light/junk volume) without dropping the score directionality:
//     <55% 1RM (>32 reps to failure)  → 0    descartado (carga floja, sin estímulo útil)
//     55-65% (15-32 reps to failure)  → ramp 0→1
//     ≥65% 1RM (≤15 reps to failure)  → 1.0  zona productiva
// F (failure) ≠ RIR 0: you attempted past your last successful rep and failed → reps_to_failure = r + 0.5
// (slight bump over RIR 0 = r reps to failure). Refalo 2024 says F ≈ RIR 1-2 for hypertrophy outcome.
function repsToFailure(reps,rir){ if(!(reps>0))return 0; const t=String(rir==null?'':rir).trim().toUpperCase(); if(t==='F')return reps+0.5; if(t==='')return reps; const rv=parseFloat(t); if(isNaN(rv))return reps; return reps+Math.max(0,Math.min(6,rv)); }
function impliedIntensity(reps,rir){ const tr=repsToFailure(reps,rir); return tr>0 ? 1/(1+tr/30) : 0; }
function intensityFactor(i){ if(i<0.55)return 0; if(i<0.65)return (i-0.55)/0.10; return 1; }
// setZone — quality flag used in UI to nudge the user:
//   'light'      — push more weight (or fewer reps near failure)   <65% 1RM (>15 reps to failure)
//   'productive' — in the productive zone (target for hypertrophy) 65-92% 1RM (3-15 reps to failure)
//   'heavy'      — too heavy / too few reps for hypertrophy volume >92% 1RM (1-3 reps to failure)
function setZone(s){ const r=parseFloat(s&&s.r)||0; if(!(r>0))return null; const i=impliedIntensity(r,s&&s.rir); if(i<0.65)return 'light'; if(i>0.92)return 'heavy'; return 'productive'; }
function setScore(s){ const w=parseFloat(s&&s.w)||0, r=parseFloat(s&&s.r)||0; if(!(w>0&&r>0))return 0; const tr=repsToFailure(r,s&&s.rir); const i=1/(1+tr/30); const f=intensityFactor(i); if(f===0)return 0; return w*(1+tr/30)*f; }
function bestScore(sets,confirmedOnly){ let b=0; (sets||[]).forEach(s=>{ if(confirmedOnly&&s._pf)return; const v=setScore(s); if(v>b)b=v; }); return b; }
function totalScore(sets,confirmedOnly){ let sum=0,n=0; (sets||[]).forEach(s=>{ if(confirmedOnly&&s._pf)return; const v=setScore(s); if(v>0){sum+=v;n++;} }); return {sum,n}; }
// Best observed Epley+RIR e1RM across SAVED sessions — kept as a reference helper (e.g. for future PR badges).
// No longer used inside the per-set score — that signal is now self-contained from reps + RIR alone.
function bestE1RM(name,uni){ const key=(name||'').toLowerCase().trim(); let best=0; (db.sessions||[]).forEach(s=>{ if(s.type==='rest')return; (s.exercises||[]).forEach(e=>{ if((e.name||'').toLowerCase().trim()!==key||!e.sets||!e.sets.length)return; const eUni=e.sets.some(x=>x.side); if(!!uni!==eUni)return; (e.sets||[]).forEach(st=>{ const w=parseFloat(st.w)||0, r=parseFloat(st.r)||0; if(!(w>0&&r>0))return; const t=String(st.rir==null?'':st.rir).trim().toUpperCase(); let rv=(t===''||t==='F')?0:parseFloat(t); if(isNaN(rv))rv=0; rv=Math.max(0,Math.min(6,rv)); const e1=w*(1+(r+rv)/30); if(e1>best)best=e1; }); }); }); return best; }
function progFromScores(cur,last){ if(!(cur>0)||!(last>0))return null; const ratio=cur/last; return {dir:ratio>1.02?'up':(ratio<0.98?'down':'flat'), pct:Math.round((ratio-1)*100)}; }
function exerciseProgress(ex){
  const cur=totalScore(ex.sets,true); const prev=totalScore(lastLoggedSets(ex.name,ex.unilateral),false);
  if(!cur.n||!prev.n)return null;
  const projected = cur.n>=prev.n ? cur.sum : (cur.sum/cur.n)*prev.n;
  return progFromScores(projected, prev.sum);
}
// previous occurrence of an exercise (by date, then insertion order) BEFORE a given saved session — for history
function prevSetsForHist(name,uni,curId){ const key=(name||'').toLowerCase().trim(); const occ=[]; (db.sessions||[]).forEach((s,idx)=>{ if(s.type==='rest')return; (s.exercises||[]).forEach(e=>{ if((e.name||'').toLowerCase().trim()!==key||!e.sets||!e.sets.length)return; const eUni=e.sets.some(x=>x.side); if(!!uni!==eUni)return; occ.push({id:s.id,date:String(s.date||''),idx,sets:e.sets}); }); }); occ.sort((a,b)=> a.date.localeCompare(b.date) || a.idx-b.idx); const pos=occ.findIndex(o=>o.id===curId); if(pos<=0)return null; return occ[pos-1].sets; }
function histProgress(e,sessId){ const cur=totalScore(e.sets,false), prev=totalScore(prevSetsForHist(e.name,(e.sets||[]).some(x=>x.side),sessId),false); return progFromScores(cur.sum, prev.sum); }
// Count sets by zone — surfaced as a coaching hint next to the progress badge.
function exerciseZones(ex){ const z={light:0,productive:0,heavy:0}; (ex.sets||[]).forEach(s=>{ if(s._pf)return; const zn=setZone(s); if(zn&&z[zn]!=null)z[zn]++; }); return z; }
function sessionProgAgg(s){ let up=0,down=0; (s.exercises||[]).forEach(e=>{ const pr=histProgress(e,s.id); if(pr){ if(pr.dir==='up')up++; else if(pr.dir==='down')down++; } }); return {up,down}; }

function bloating(t,g){

  // FOOD drives retention: Na:K balance dominates (validated marker; K drives natriuresis), acute Na load,
  // hydration (low intake -> RAAS/ADH retention), sugar/insulin-driven Na reabsorption, alcohol (ADH/rebound).
  // ACTIVITY relieves it same-day: a gym session + steps mobilize extracellular fluid (sweat, sympathetic
  // diuresis, venous/lymphatic return). Carbs/glycogen water excluded (muscle fullness, not skin puffiness).
  const c=x=>Math.max(0,Math.min(1,x));
  const naK=t.sodium/Math.max(t.potassium,1);                  // Na:K mass ratio
  const naKterm=c((naK-0.5)/1.5);                              // ~0.5 balanced (WHO 2000/3500), >=2.0 high
  const naAbs=c(((t.sodium/(g.sodium||2300))-0.8)/0.7);        // big acute sodium load
  const hyd=c(1-t.water/(g.water||3));                         // under-drinking -> retention
  const sugar=c((t.sugar/(g.sugar||50))-1);                    // sugar/insulin -> acute Na reabsorption
  const alc=c((t.alcohol||0)/28);                              // alcohol ~2 drinks -> notable
  const nutr=42*naKterm + 14*naAbs + 22*hyd + 12*sugar + 18*alc;  // food-driven retention, 0..~108
  // ── same-day activity relief (reads Gym sessions + Habits steps for the displayed day) ──
  const day=curDate();
  const sess=(db.sessions||[]).filter(s=>s&&s.date===day&&s.type!=='rest');
  const trained=sess.some(s=>(s.exercises||[]).some(e=>(e.sets||[]).some(st=>st&&(st.done||(+st.w>0)||(+st.r>0)))));
  const trainSec=sess.reduce((mx,s)=>Math.max(mx,(+s.durSec||0)),0);
  const trainRelief=trained?Math.max(0.6,c(trainSec/3600)):0;  // a logged workout >=0.6, full at ~60min
  const steps=(db.steps&&+db.steps[day])||0;
  const stepRelief=c(steps/10000);                             // 10k steps -> full step relief
  const activity=c(0.6*stepRelief + 0.7*trainRelief);          // combined 0..1
  const sedentary=(!trained && steps>0 && steps<3000)?8*c((3000-steps)/3000):0;  // pooling when truly sedentary
  let sc=nutr*(1 - 0.32*activity) + sedentary;                 // activity shaves up to ~32% off the food load

  // Actionable suggestions — what to prioritize to de-bloat
  const tips=[];
  if(naK>1.2) tips.push('prioriza potasio (plátano, papa, espinaca, agua de coco)');
  if((t.sodium/(g.sodium||2300))>1) tips.push('baja sodio el resto del día');
  if(hyd>0.3) tips.push('toma más agua (paradójicamente reduce retención)');
  if(alc>0.2) tips.push('alcohol alto → hidrata + electrolitos antes de dormir');
  if(sugar>0.2) tips.push('reduce azúcar/refinados');
  if(!trained && steps<6000) tips.push('muévete: caminar/entrenar drena líquido (sudor + circulación)');
  else if(activity>0.4 && nutr>28) tips.push('tu actividad de hoy ya está bajando la retención ✓');
  if(!tips.length) tips.push('balance ok · Na:K, agua y actividad estables');

function miniBars(vals,labels,opt){ opt=opt||{}; const nums=(vals||[]).map(v=>+v||0); if(!nums.length)return '';
  let lo=opt.norm?Math.min(...nums):0, hi=Math.max(...nums); if(hi<=lo)hi=lo+1; const h=opt.h||44;
  return `<div style="display:flex;gap:4px;align-items:flex-end;margin:8px 0 2px;height:${h+11}px">`+nums.map((v,i)=>{
    const ph=Math.round(((v-lo)/(hi-lo))*92)+(v>0||opt.norm?6:0); const cur=i===nums.length-1;
    return `<div style="flex:1;display:flex;flex-direction:column;justify-content:flex-end;align-items:center;height:100%"><div title="${v}" style="width:78%;height:${Math.max(ph,2)}%;background:${cur?'var(--fill)':'var(--o30)'}"></div><span style="font-size:7px;color:var(--o40);margin-top:3px;height:8px;line-height:1">${(labels&&labels[i])||''}</span></div>`;
  }).join('')+`</div>`; }
// single-dot line chart (Rimu-style: thin line + dots + soft gradient fill); opt.zero baselines at 0
function lineChart(vals,opt){ opt=opt||{}; const nums=(vals||[]).map(v=>+v||0); if(!nums.length)return '';
  const W=300,H=opt.h||56,pad=7; let lo=Math.min(...nums),hi=Math.max(...nums); if(opt.zero)lo=Math.min(0,lo); if(hi<=lo)hi=lo+1;
  const n=nums.length; let xs;
  if(opt.dates&&opt.dates.length===n&&n>1){ const ts=opt.dates.map(d=>Date.parse(d)||0); const tlo=Math.min(...ts),thi=Math.max(...ts),tsp=(thi-tlo)||1; xs=ts.map(t=>pad+(t-tlo)/tsp*(W-2*pad)); }
  else { xs=nums.map((_,i)=>n>1?pad+i*(W-2*pad)/(n-1):W/2); }
  const Y=v=>+(H-pad-((v-lo)/(hi-lo))*(H-2*pad)).toFixed(1);
  const pts=nums.map((v,i)=>xs[i].toFixed(1)+','+Y(v));
  const dots=nums.map((v,i)=>(i===n-1||n<=45||i%Math.round(n/24)===0)?`<circle cx="${xs[i].toFixed(1)}" cy="${Y(v)}" r="${i===n-1?2.8:1.7}" fill="${i===n-1?'var(--fill)':'var(--o40)'}"/>`:'').join('');
  let extra='',hit='';
  if(opt.interactive){ const lbls=opt.labels||nums.map(v=>String(v)); const pd=nums.map((v,i)=>({f:+(xs[i]/W).toFixed(4),l:lbls[i]})); extra=` data-act="chartpt" data-pts='${JSON.stringify(pd).replace(/'/g,'&#39;')}'`; hit=`<rect x="0" y="0" width="${W}" height="${H}" fill="transparent" pointer-events="all"/>`; }
  return `<svg viewBox="0 0 ${W} ${H}" preserveAspectRatio="none"${extra} style="width:100%;height:${H}px;display:block;margin:10px 0 2px${opt.interactive?';cursor:pointer':''}"><defs><linearGradient id="lcg" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="var(--fill)" stop-opacity=".16"/><stop offset="1" stop-color="var(--fill)" stop-opacity="0"/></linearGradient></defs><polygon points="${pad},${H-pad} ${pts.join(' ')} ${W-pad},${H-pad}" fill="url(#lcg)"/><polyline points="${pts.join(' ')}" fill="none" stroke="var(--o60)" stroke-width="1.4" stroke-linejoin="round" stroke-linecap="round"/>${dots}${hit}</svg>`; }
// meal nutrient radar — heptagon, pairs opposite, straight polygon. Ejes = MISMO % que la tabla
// (macros: % de aporte calórico de la meal · micros: % de la meta diaria). Radio: escala exponencial-invertida
// (0%=centro, 100%=borde; avanza rápido y se frena cerca de 100). Anillos guía a 25/50/75/100% con la misma escala.
function mealRadar(t,g){ g=g||{};
  const ax=[{k:'protein',l:'P',c:4},{k:'fat',l:'F',c:9},{k:'sodium',l:'Na'},{k:'alcohol',l:'alc',c:7},{k:'carbs',l:'C',c:4},{k:'fiber',l:'Fbr'},{k:'potassium',l:'K'}];
  const W=180,H=166,cx=90,cy=83,R=64,N=ax.length;
  const ang=i=>(-90+360/N*i)*Math.PI/180;
  const at=(i,r)=>[+(cx+Math.cos(ang(i))*r).toFixed(1),+(cy+Math.sin(ang(i))*r).toFixed(1)];
  const KK=1.8, EZ=1-Math.exp(-KK);
  const warp=x=>{ x=x<0?0:x>1?1:x; return (1-Math.exp(-KK*x))/EZ; };       // meal: exponencial (rápido->lento, frena al final)
  const kcalTot=(t.protein*4+t.carbs*4+t.fat*9+t.alcohol*7)||1;
  const frac=a=> a.c ? (+t[a.k]||0)*a.c/kcalTot : ((+g[a.k]>0)?(+t[a.k]||0)/g[a.k]:0); // 0..1 = % de la tabla
  let grid='';
  [0.125,0.25,0.375,0.5,0.625,0.75,0.875,1].forEach(rr=>{ const wr=warp(rr); grid+=`<polygon points="${ax.map((_,i)=>at(i,R*wr).join(',')).join(' ')}" fill="none" stroke="var(--o12)" stroke-width=".5"/>`; });
  ax.forEach((_,i)=>{ const e=at(i,R); grid+=`<line x1="${cx}" y1="${cy}" x2="${e[0]}" y2="${e[1]}" stroke="var(--o12)" stroke-width=".5"/>`; });
  const rad=ax.map(a=>warp(frac(a))); const maxR=Math.max.apply(null,rad.concat(0.0001)); const thr=maxR*0.85;
  const dpts=ax.map((a,i)=>at(i,R*Math.max(0.04,rad[i])));
  const path='M'+dpts.map(q=>q[0]+','+q[1]).join('L')+'Z';
  let ddots=''; ax.forEach((a,i)=>{ const c=at(i,R*Math.max(0.04,rad[i])), dom=rad[i]>=thr; ddots+=`<circle cx="${c[0]}" cy="${c[1]}" r="1.6" fill="${dom?'var(--fill)':'var(--o40)'}"/>`; });
  let labels=''; ax.forEach((a,i)=>{ const lp=at(i,R+9), dom=rad[i]>=thr; labels+=`<text x="${lp[0]}" y="${lp[1]}" text-anchor="middle" dominant-baseline="middle" font-size="7.5" fill="${dom?'var(--fill)':'var(--o35)'}">${a.l}</text>`; });
  const cross=`<line x1="${cx-3}" y1="${cy}" x2="${cx+3}" y2="${cy}" stroke="var(--o30)" stroke-width=".7"/><line x1="${cx}" y1="${cy-3}" x2="${cx}" y2="${cy+3}" stroke="var(--o30)" stroke-width=".7"/>`;
  return `<svg viewBox="6 2 168 156" preserveAspectRatio="xMidYMid meet" style="display:block">`
    +grid+cross
    +`<path d="${path}" fill="var(--fill)" class="rad-fill"/>`
    +`<path d="${path}" fill="none" stroke="var(--fill)" stroke-width="1.2" stroke-linejoin="miter" stroke-miterlimit="2" stroke-opacity=".95"/>`
    +ddots+labels+`</svg>`;
}
// day-totals radar — 7 axes vs daily goal (P/C/F as grams-vs-goal, not %kcal). No alcohol/sugar/caffeine.
function dayRadar(t,g){ g=g||{};
  const ax=[{k:'protein',l:'P'},{k:'fat',l:'F'},{k:'sodium',l:'Na'},{k:'water',l:'Liq'},{k:'carbs',l:'C'},{k:'fiber',l:'Fbr'},{k:'potassium',l:'K'}];
  const W=180,H=166,cx=90,cy=83,R=64,N=ax.length;

  const at=(i,r)=>[+(cx+Math.cos(ang(i))*r).toFixed(1),+(cy+Math.sin(ang(i))*r).toFixed(1)];
  const KK=1.8, EZ=1-Math.exp(-KK);
  const warp=x=>{ x=x<0?0:x>1?1:x; return -Math.log(1-x*EZ)/KK; };       // total: invertida (lento->rápido, acelera al final)
  const frac=a=> (+g[a.k]>0) ? (+t[a.k]||0)/(+g[a.k]) : 0;
  let grid='';

  ax.forEach((_,i)=>{ const e=at(i,R); grid+=`<line x1="${cx}" y1="${cy}" x2="${e[0]}" y2="${e[1]}" stroke="var(--o12)" stroke-width=".5"/>`; });
  const rad=ax.map(a=>warp(frac(a))); const maxR=Math.max.apply(null,rad.concat(0.0001)); const thr=maxR*0.85;
  const dpts=ax.map((a,i)=>at(i,R*Math.max(0.04,rad[i])));
  const path='M'+dpts.map(q=>q[0]+','+q[1]).join('L')+'Z';
  let ddots=''; ax.forEach((a,i)=>{ const c=at(i,R*Math.max(0.04,rad[i])), dom=rad[i]>=thr; ddots+=`<circle cx="${c[0]}" cy="${c[1]}" r="1.6" fill="${dom?'var(--fill)':'var(--o40)'}"/>`; });
  let labels=''; ax.forEach((a,i)=>{ const lp=at(i,R+9), dom=rad[i]>=thr; labels+=`<text x="${lp[0]}" y="${lp[1]}" text-anchor="middle" dominant-baseline="middle" font-size="7.5" fill="${dom?'var(--fill)':'var(--o35)'}">${a.l}</text>`; });
  const cross=`<line x1="${cx-3}" y1="${cy}" x2="${cx+3}" y2="${cy}" stroke="var(--o30)" stroke-width=".7"/><line x1="${cx}" y1="${cy-3}" x2="${cx}" y2="${cy+3}" stroke="var(--o30)" stroke-width=".7"/>`;
  return `<svg viewBox="6 2 168 156" preserveAspectRatio="xMidYMid meet" style="display:block">`
    +grid+cross
    +`<path d="${path}" fill="var(--fill)" class="rad-fill"/>`
    +`<path d="${path}" fill="none" stroke="var(--fill)" stroke-width="1.2" stroke-linejoin="miter" stroke-miterlimit="2" stroke-opacity=".95"/>`
    +ddots+labels+`</svg>`;
}

function importPairs(str,fn){ let n=0; (str||'').split(',').slice(0,500).forEach(p=>{ const i=p.indexOf(':'); if(i<1)return; const k=p.slice(0,i).trim(), v=p.slice(i+1).trim(); if(!/^\d{4}-\d{2}-\d{2}$/.test(k))return; try{ if(fn(k,v))n++; }catch(_){} }); return n; }
// parse a ?sleep= value into the stored sleep shape (mismo que openSleepLog):
//   "7.5"               -> 7.5  (número = horas dormidas, sin ventana)
//   "23:30-07:00"       -> {start,end,date,isNocturnal,hours=duración en-cama}
//   "7.5@23:30-07:00"   -> {start,end,date,isNocturnal,hours=7.5}  (horas dormidas + ventana en-cama de Salud)
// devuelve null si es inválido (se descarta, como steps/weight).
function parseSleepVal(raw, date){
  raw=String(raw||'').trim(); if(!raw) return null;
  const validHM=x=>{ const a=String(x).split(':'); if(a.length!==2)return false; const H=+a[0],M=+a[1]; return isFinite(H)&&isFinite(M)&&H>=0&&H<=23&&M>=0&&M<=59; }; // valida HH:MM (param no confiable)
  let hours=null, win=null;
  if(raw.indexOf('@')>=0){ const a=raw.split('@'); hours=parseFloat(a[0]); win=a[1]; }
  else if(raw.indexOf('-')>=0){ win=raw; }
  else { hours=parseFloat(raw); }
  if(win){ const m=String(win).split('-'); const s=(m[0]||'').trim(), e=(m[1]||'').trim();
    if(!validHM(s)||!validHM(e)) return null;
    const h=(hours!=null&&isFinite(hours))?hours:sleepDur(s,e);
    if(!(h>0&&h<24)) return null;
    return {start:s, end:e, date:date, isNocturnal:isNocturnal(s), hours:Math.round(h*10)/10};
  }
  if(hours!=null&&isFinite(hours)&&hours>0&&hours<24) return Math.round(hours*10)/10;
  return null;
}
function importHealth(sp){ const msg=[];
  if(sp.has('steps')){ const n=parseInt(sp.get('steps'),10); if(!isNaN(n)&&n>=0&&n<200000){ db.steps=db.steps||{}; db.steps[todayISO()]=n; msg.push(n.toLocaleString()+' pasos · hoy'); } }
  if(sp.has('stepsh')){ db.steps=db.steps||{}; const c=importPairs(sp.get('stepsh'),(k,v)=>{ const n=parseInt(v,10); if(isNaN(n)||n<0||n>=200000)return false; db.steps[k]=n; return true; }); if(c)msg.push(c+' días de pasos'); }
  if(sp.has('weight')){ const w=parseFloat(sp.get('weight')); if(w>=20&&w<=400){ db.bodyweight=db.bodyweight||{}; db.bodyweight[todayISO()]=Math.round(w*10)/10; if(db.profile)db.profile.weightKg=Math.round(w*10)/10; msg.push((Math.round(w*10)/10)+' kg · hoy'); } }
  if(sp.has('weighth')){ db.bodyweight=db.bodyweight||{}; const c=importPairs(sp.get('weighth'),(k,v)=>{ const w=parseFloat(v); if(!(w>=20&&w<=400))return false; db.bodyweight[k]=Math.round(w*10)/10; return true; }); if(c){ const ks=Object.keys(db.bodyweight).sort(); if(ks.length&&db.profile)db.profile.weightKg=db.bodyweight[ks[ks.length-1]]; msg.push(c+' registros de peso'); } }
  if(sp.has('stepsq')){ const arr=(sp.get('stepsq')||'').split(','); const N=arr.length; let end=sp.get('qend'); const _tst=end&&/^\d{4}-\d{2}-\d{2}$/.test(end)?new Date(end+'T12:00:00'):null; if(!_tst||isNaN(_tst.getTime()))end=todayISO(); db.steps=db.steps||{}; let c=0; for(let i=0;i<N;i++){ const n=parseInt(arr[i],10); if(isNaN(n)||n<0||n>=200000)continue; const d=shiftDate(end,-(N-1-i)); if(!/^\d{4}-\d{2}-\d{2}$/.test(d))continue; db.steps[d]=n; c++; } if(c)msg.push(c+' días de pasos'); }
  if(sp.has('sleep')){ const v=parseSleepVal(sp.get('sleep'), todayISO()); if(v!=null){ db.sleep=db.sleep||{}; db.sleep[todayISO()]=v; msg.push(sleepHours(v)+' h de sueño · hoy'); } }
  if(sp.has('sleeph')){ db.sleep=db.sleep||{}; const c=importPairs(sp.get('sleeph'),(k,val)=>{ const v=parseSleepVal(val,k); if(v==null)return false; db.sleep[k]=v; return true; }); if(c)msg.push(c+' días de sueño'); }
  return msg; }

  const spanDays=Math.round((new Date(bISO+'T12:00:00')-new Date(aISO+'T12:00:00'))/86400000);

  const ai=todayISO(a), bi=todayISO(b); const byM={};

// best Epley e1RM per SESSION for one exercise (chronological), within last `days`
function liftE1Series(name, days){

  (db.sessions||[]).forEach(s=>{ if(s.type==='rest'||!s.date||s.date<cutoff)return;
    let best=0; (s.exercises||[]).forEach(e=>{ if(e.name!==name)return; (e.sets||[]).forEach(st=>{ const wv=parseFloat(st.w)||0,r=parseFloat(st.r)||0; if(wv&&r){ const e1=wv*(1+repsToFailure(r,st.rir)/30); if(e1>best)best=e1; } }); });

    const earliest=sd.concat(bd).sort()[0]; if(!earliest) return '';

// item shape: { id, name, category:'supp'|'skin'|'meds', dose, unit?, when:[], periodization:{type,value}, notes,
//               startDate, endDate?, med?:{doctor,duration}, ticks:{'YYYY-MM-DD':'taken'|'late'|'skipped'}, archived? }

function tickState(v){ if(v===true)return 'taken'; if(v==='taken'||v==='late'||v==='skipped')return v; return null; }

const TICK_SYM={taken:'✓',late:'~',skipped:'✗'};
function isDueToday(item, iso){
  if(!item || item.archived) return false;
  if(item.startDate && iso < item.startDate) return false;
  if(item.endDate && iso > item.endDate) return false;
  const p=item.periodization||{type:'daily'};
  if(p.type==='daily' || p.type==='range') return true;
  if(p.type==='weekly'){ const d=new Date(iso+'T12:00:00').getDay(); return (p.value||[]).indexOf(d)>=0; }
  const base=new Date((item.startDate||iso)+'T12:00:00').getTime();
  const days=Math.round((new Date(iso+'T12:00:00').getTime()-base)/86400000);
  if(p.type==='everyN'){ const n=Math.max(1,+p.value||1); return days>=0 && days%n===0; }
  if(p.type==='cycle'){ const on=Math.max(0,+(p.value&&p.value.on)||0), off=Math.max(0,+(p.value&&p.value.off)||0); if(on+off===0) return true; return days>=0 && (days%(on+off))<on; }
  return true;
}
function stackPeriodLabel(item){
  const p=item.periodization||{type:'daily'};
  if(p.type==='daily') return 'diario';
  if(p.type==='weekly'){ const D=['D','L','M','M','J','V','S']; return (p.value||[]).slice().sort((a,b)=>a-b).map(d=>D[d]).join(' ')||'—'; }
  if(p.type==='everyN') return 'cada '+(p.value||2)+' días';
  if(p.type==='cycle') return 'ciclo '+(p.value?p.value.on:21)+'on/'+(p.value?p.value.off:7)+'off';
  if(p.type==='range') return 'rango'+(item.endDate?(' → '+item.endDate.slice(5)):'');
  return '';
}
function stackPct(iso){

  if(!due.length) return null;
  const done=due.filter(x=>x.ticks&&tickDone(x.ticks[iso])).length;
  return {done, total:due.length, pct:Math.round(done/due.length*100)};

// ---------- rest timer (between sets) ----------
// state lives in db.activeWork.restEnd (epoch ms) → persisted by save(), survives re-renders, reloads and iOS kills.
let _restFinT=0, _restAC=null;
function fmtRest(s){ s=Math.max(0,Math.round(s)); return Math.floor(s/60)+':'+pad(s%60); }
// AudioContext must be created/resumed inside a user gesture (iOS) — called on each 'done' tap
function restAudioInit(){ if(!db.settings.restBeep)return; try{ const AC=window.AudioContext||window.webkitAudioContext; if(!AC)return; if(!_restAC)_restAC=new AC(); if(_restAC.state==='suspended')_restAC.resume().catch(()=>{}); }catch(_){} }
function restNotify(){ try{ if(navigator.vibrate)navigator.vibrate(200); }catch(_){}
  if(!db.settings.restBeep||!_restAC)return;
  try{ const t=_restAC.currentTime; [0,.18].forEach(off=>{ const o=_restAC.createOscillator(), g=_restAC.createGain(); o.type='sine'; o.frequency.value=880; g.gain.setValueAtTime(0.0001,t+off); g.gain.exponentialRampToValueAtTime(0.15,t+off+.02); g.gain.exponentialRampToValueAtTime(0.0001,t+off+.08); o.connect(g); g.connect(_restAC.destination); o.start(t+off); o.stop(t+off+.1); }); }catch(_){}
}
function updateRestBar(){
  const bar=document.getElementById('resttimer'), tEl=document.getElementById('resttime'); if(!bar||!tEl)return;
  const w=db&&db.activeWork;
  // expire (recomputed from Date.now() — survives iOS freezing timers in background)
  if(w&&!w.loggedAfter&&w.restEnd&&w.restEnd<=Date.now()){ const late=Date.now()-w.restEnd>30000; w.restEnd=null; save(); if(!late){ restNotify(); _restFinT=Date.now(); } }
  const show=state.screen==='workout'&&w&&!w.loggedAfter;
  if(!show){ bar.classList.remove('on','fin'); return; }
  if(w.restEnd){ bar.classList.add('on'); bar.classList.remove('fin'); tEl.textContent=fmtRest((w.restEnd-Date.now())/1000); return; }
  if(_restFinT&&Date.now()-_restFinT<2200){ bar.classList.add('on'); bar.classList.add('fin'); tEl.textContent='listo'; return; }
  bar.classList.remove('on','fin');
}

// ---------- boot screen + day recap overlays (gamification: "disciplina visualizada", no confetti) ----------
function uptimeDays(){ try{ const s=db.profile&&db.profile.since; if(!s)return 0; const ms=new Date(todayISO()+'T12:00:00')-new Date(s+'T12:00:00'); return Math.max(0,Math.round(ms/86400000)); }catch(_){ return 0; } }
// generic full-frame overlay: tap or timeout dismisses; onDone chains (boot → recap, never stacked)
// raw WebGL (sin Three.js → offline-safe): shader de mosaico de líneas MONOCROMO para la carga/boot. Devuelve un stop().
function startShader(canvas){
  let gl=null; try{ gl=canvas.getContext('webgl',{antialias:false,alpha:false})||canvas.getContext('experimental-webgl'); }catch(_){}

  let bestWeek=0; for(let i=0;i<mdays.length;i++){ let s=0; for(let j=i;j<i+7&&j<mdays.length;j++)s+=dayVol[mdays[j]]||0; if(s>bestWeek)bestWeek=s; }

  const avgKcal=kDays?Math.round(kSum/kDays):0;
  const bwk=Object.keys(db.bodyweight||{}).filter(inMonth).sort();
  const bwStart=bwk.length?db.bodyweight[bwk[0]]:null, bwEnd=bwk.length?db.bodyweight[bwk[bwk.length-1]]:null;

}

    const view=document.getElementById('view'); if(view){ const H=window.innerHeight; if(y<96)view.scrollTop-=11; else if(y>H-96)view.scrollTop+=11; }
    clearMarks(); const els=dropTargets(); let idx=els.length, before=null;
    for(let i=0;i<els.length;i++){ const r=els[i].getBoundingClientRect(); if(y<r.top+r.height/2){ idx=i; before=els[i]; break; } }

  function end(){ const cur=d; cleanup(); if(!cur||!cur.live)return; const w=db.activeWork; if(!w)return; const xs=w.exercises; let changed=false;
    if(cur.kind==='ex'){ const b=cur.blk, len=b.end-b.start, p=cur.exi-b.start; let q=Math.max(0,Math.min(len, cur.idx==null?len:cur.idx)); const fin=q>p?q-1:q;
      if(fin!==p){ const it=xs.splice(cur.exi,1)[0]; xs.splice(b.start+fin,0,it); changed=true; } }
    else { const bs=curBlocks(), m=cur.mg; let q=Math.max(0,Math.min(bs.length, cur.idx==null?bs.length:cur.idx)); const fin=q>m?q-1:q;

        const flat=[]; order.forEach(i=>{ for(const it of slices[i])flat.push(it); }); xs.length=0; for(const it of flat)xs.push(it); changed=true; } }
    if(changed){ save(); state._scroll=(document.getElementById('view')||{}).scrollTop||0; render(); }
  }
  function cleanup(){ document.removeEventListener('touchmove',move); document.removeEventListener('touchend',end); document.removeEventListener('touchcancel',end);
    document.removeEventListener('mousemove',move); document.removeEventListener('mouseup',end);
    clearMarks(); document.body.classList.remove('dragging'); document.querySelectorAll('.dragsrc').forEach(el=>el.classList.remove('dragsrc'));

  app.addEventListener('touchstart',e=>{ if(d)return; const g=e.target.closest('.dgrip'); if(!g)return; const p=pt(e); begin(g.dataset.drage!=null?'ex':'mg',g,p.clientX,p.clientY); },{passive:true});

function saveExEdit(){
  const {di,ei}=window._exEdit||{}; const name=val('ee_name'); if(!name){alert('Pon nombre.');return;}
  const pv=id=>{const x=document.querySelector('#'+id+' .t.on');return x?x.dataset.v:'';};
  const t=pv('ee_type'); const validT=['machine','pulley','free','bodyweight'].indexOf(t)>=0?t:'free';
  // build canonical muscles array: primary (1.0) + optional secondary (custom decimal). Keep e.muscle = primary name for legacy code paths.
  const m1=(val('ee_muscle')||'other').toLowerCase().trim();
  const muscles=[{name:m1,weight:1}];
  const m2wrap=document.getElementById('ee_mus2wrap');
  if(m2wrap && m2wrap.style.display!=='none'){
    const m2=(val('ee_mus2')||'').toLowerCase().trim();
    if(m2){ const w2=Math.max(0,Math.min(1,parseFloat(document.getElementById('ee_mus2w').value)||0.5)); muscles.push({name:m2,weight:w2}); }
  }
  const ex={name,muscle:m1,muscles,type:validT,machine:val('ee_machine'),unilateral:document.getElementById('ee_uni').checked,startSide:(pv('ee_start')==='L'?'L':'R'),sets:Math.max(1,+val('ee_sets')||1)};
  const {liveExi,origName}=window._exEdit||{};
  if(liveExi!=null && db.activeWork && db.activeWork.exercises[liveExi]){
    const w=db.activeWork; const lx=w.exercises[liveExi];
    // update metadata IN PLACE — keep logged sets + the unilateral structure of the live session intact
    lx.name=ex.name; lx.muscle=ex.muscle; lx.muscles=ex.muscles; lx.type=ex.type; lx.machine=ex.machine;
    // mirror the change into the split definition so it persists for future sessions
    const di2=(db.split.days||[]).findIndex(d=>d.id===w.dayId);
    if(di2>=0){ const arr=db.split.days[di2].exercises||[]; let j=arr.findIndex(x=>(x.name||'').toLowerCase().trim()===String(origName||'').toLowerCase().trim()); if(j<0)j=arr.findIndex(x=>(x.name||'').toLowerCase().trim()===ex.name.toLowerCase().trim()); if(j>=0)arr[j]=Object.assign({},arr[j],{name:ex.name,muscle:ex.muscle,muscles:ex.muscles,type:ex.type,machine:ex.machine,unilateral:ex.unilateral,startSide:ex.startSide}); }
    save(); closeModal(); render(); return;
  }
  if(ei<0)db.split.days[di].exercises.push(ex); else db.split.days[di].exercises[ei]=ex;
  // optional: propagate the new metadata to past SESSIONS that logged this same exercise NAME at the current gym
  const propBox=document.getElementById('ee_propagate');
  if(propBox && propBox.checked){
    const gym=db.activeGym||''; const key=ex.name.toLowerCase().trim(); let touched=0;
    (db.sessions||[]).forEach(s=>{ if(s.type==='rest')return; if(gym && (s.gym||'')!==gym)return;
      (s.exercises||[]).forEach(se=>{ if((se.name||'').toLowerCase().trim()!==key)return;
        if(ex.muscle && ex.muscle!=='other')se.muscle=ex.muscle;
        if(ex.machine)se.machine=ex.machine;
        // keep saved sets untouched; only enrich metadata
        touched++;
      });
    });
    if(touched)alert('Actualizadas '+touched+' ocurrencias en sesiones pasadas en '+(gym||'(sin gym)')+'.');
  }
  save(); closeModal(); render();
}

function importIronlogSplit(d){

    id: dy.id||('d'+i+uid()),
    name:(dy.name||('día '+(i+1))).trim(),
    tag:'@ '+(dy.metric||'RIR')+(dy.allowFailure!==false?' · F':''),
    focus:dy.focus||'', metric:(dy.metric||'rir').toLowerCase(), allowFailure:dy.allowFailure!==false,
    exercises:(dy.exercises||[]).map(e=>({
      name:(e.name||'').trim(),
      muscle:(e.muscleTag||e.muscle||'other').replace(/^#/,'').toLowerCase(),
      type:e.type==='machine'?'machine':'free',
      machine:e.machine||'', unilateral:!!e.unilateral,
      sets:Math.max(1,+e.sets||1), unit:e.unit||'', useFS:!!e.useFS, note:e.note||''
    }))
  }));
  return {name:(d.name||'imported split').trim(), days};
}

// known exercises: returns the FULL property set per unique exercise name (last-seen wins for each prop).
// Source order: split definitions FIRST (defaults), then sessions in chronological order (most recent overrides).
// This makes exercise identity consistent across split days — pick a known name → auto-fill ALL its variables.
function knownExercises(){
  const map={};
  const upsert=(src,e,fromSets)=>{ if(!e||!e.name)return; const k=e.name.toLowerCase().trim();
    if(!map[k])map[k]={name:e.name};
    const o=map[k];
    ['muscle','type','machine','unilateral','startSide','useFS','unit','note'].forEach(p=>{ if(e[p]!=null&&e[p]!=='')o[p]=e[p]; });
    if(Array.isArray(e.muscles)&&e.muscles.length) o.muscles=e.muscles.slice();  // remember primary+secondary muscles
    if(e.sets!=null && typeof e.sets==='number') o.sets = e.sets;
    if(fromSets && Array.isArray(e.sets) && e.sets.length){
      if(e.sets.some(x=>x.side)) o.unilateral=true;  // detect uni from actual logged sets
      const lastUnit=(e.sets[e.sets.length-1]||{}).unit; if(lastUnit) o.unit=lastUnit;
    }
  };
  (db.split&&db.split.days||[]).forEach(d=>(d.exercises||[]).forEach(e=>upsert('split',e,false)));
  (db.sessions||[]).slice().sort((a,b)=>String(a.date||'').localeCompare(String(b.date||''))).forEach(s=>{
    if(s.type==='rest')return; (s.exercises||[]).forEach(e=>upsert('session',e,true));
  });
  return Object.values(map);
}
function lookupKnownExercise(name){ if(!name)return null; const k=name.toLowerCase().trim(); return knownExercises().find(x=>x.name.toLowerCase().trim()===k)||null; }
// catalog: all knownExercises grouped by muscle, with gym tags + session counts gathered from sessions[].
function exerciseDirectory(){
  const list=knownExercises();
  list.forEach(e=>{ const gyms=new Set(); let sess=0; const key=e.name.toLowerCase().trim();
    (db.sessions||[]).forEach(s=>{ if(s.type==='rest')return; (s.exercises||[]).forEach(se=>{ if((se.name||'').toLowerCase().trim()===key){ if(s.gym)gyms.add(s.gym); sess++; } }); });
    e._gyms=[...gyms]; e._sess=sess;
  });
  // multi-muscle: exercise appears under EACH muscle it hits (with its weight noted as secondary)
  const byM={};
  list.forEach(e=>{ const muscles=exMuscles(e); if(!muscles.length){ (byM['sin músculo']=byM['sin músculo']||[]).push({...e,_w:1}); return; }
    muscles.forEach(m=>{ (byM[m.name]=byM[m.name]||[]).push({...e,_w:m.weight}); });
  });
  return byM;
}

// OpenFoodFacts only has barcoded packaged products; these cover the generic whole foods it lacks
// (huevo, res, cebolla…). Values are ~per-100 g edible portion (USDA-derived approximations);
// base:'ml' entries are per-100 ml. sodium/potassium in mg. sv=serving g · pc=piece g · ct=container g.
const bfNorm=s=>(s||'').toString().toLowerCase().normalize('NFD').replace(/[̀-ͯ]/g,'');
// tolerant search: returns 0 (no match) or positive score (higher=better). Handles typos, partial words,
// out-of-order tokens, doubled letters, plurals. q is the raw query, f is a food.
function searchScore(q,f){ if(!q)return 0; const sn=bfNorm(q); const name=bfNorm(f.name||''), alt=bfNorm(f.alt||''), brand=bfNorm(f.brand||''); const hay=name+' '+alt+' '+brand;
  if(!sn||!hay.trim())return 0;
  // 1) Quick wins: exact substring anywhere
  if(name.indexOf(sn)===0)return 1000;            // starts with query → top
  if(name.indexOf(sn)>0) return 700;              // word in name
  if(brand.indexOf(sn)>=0)return 600;             // brand match
  if(alt.indexOf(sn)>=0) return 500;              // English alias
  // 2) Token search: every word of query must appear (substring) in hay  → handles "creama cacahuate" / "cacahuate crema"
  const tokens=sn.split(/\s+/).filter(Boolean); if(tokens.length>1){ let ok=true,sc=0; for(const t of tokens){ const p=hay.indexOf(t); if(p<0){ok=false;break;} sc+=Math.max(0,80-p); } if(ok) return 300+sc; }
  // 3) Subsequence (letters in order, gaps allowed) → "pllo"→"pollo", "ptina"→"proteina"
  let i=0,j=0,gaps=0; while(i<sn.length&&j<hay.length){ if(sn[i]===hay[j]){i++;j++;}else{j++;gaps++;} }
  if(i===sn.length){ const ratio=sn.length/(sn.length+gaps); if(ratio>=0.5) return Math.round(150+ratio*100); }
  // 4) 1-edit fuzzy on the first word (single typo, swap, missing/extra letter): "creama"<->"crema"
  const w0=name.split(/\s+/)[0]||name; if(Math.abs(w0.length-sn.length)<=2 && sn.length>=3){
    let a=w0,b=sn; if(a.length<b.length){const t=a;a=b;b=t;}
    let edits=0,k=0; for(let l=0;l<a.length;l++){ if(a[l]===b[k]) k++; else { edits++; if(edits>1) break; if(a.length>b.length) continue; k++; } }
    if(edits<=1 && k>=b.length-1) return 120;
  }
  return 0;
}

function servingToLiters(sz){
  if(!sz)return 0;
  const m=(sz+'').toLowerCase().match(/(\d+(?:[.,]\d+)?)\s*(ml|cl|dl|l\b|litre|liter)/);
  if(!m)return 0;
  const v=parseFloat(m[1].replace(',','.'));
  if(m[2]==='ml')return v/1000;
  if(m[2]==='cl')return v/100;
  if(m[2]==='dl')return v/10;
  return v; // l / litre / liter
}

// score a result by how well its name matches the query (relevance ranking)
function offScore(name,brand,qn){
  const nn=bfNorm(name||''), bn=bfNorm(brand||''); if(!nn)return -1;
  const words=qn.split(/\s+/).filter(Boolean); let sc=0;
  if(nn===qn) sc+=100;                                   // exact name
  if(nn.startsWith(qn)) sc+=50;                           // name starts with query
  words.forEach(w=>{ if(nn.split(/\s+/).includes(w)) sc+=20;      // whole-word match in name
    else if(nn.includes(w)) sc+=8;                       // substring in name
    if(bn.includes(w)) sc+=4; });                        // match in brand

  sc-=Math.min(10,Math.max(0,(nn.length-qn.length)/12));

async function searchFoods(q){
  const qn=bfNorm(q); if(!qn) return [];
  const fields='code,product_name,product_name_es,brands,countries_tags,serving_size,nutriments';
  // try MX, then US, then world (country-scoped endpoints rank local products higher)
  const endpoints=[
    'https://mx.openfoodfacts.org/cgi/search.pl?search_terms='+encodeURIComponent(q)+'&search_simple=1&action=process&json=1&page_size=40&fields='+fields,
    'https://us.openfoodfacts.org/cgi/search.pl?search_terms='+encodeURIComponent(q)+'&search_simple=1&action=process&json=1&page_size=40&fields='+fields,
    'https://world.openfoodfacts.org/cgi/search.pl?search_terms='+encodeURIComponent(q)+'&search_simple=1&action=process&json=1&page_size=40&fields='+fields
  ];
  let products=[];
  for(const url of endpoints){
    for(let attempt=0;attempt<2;attempt++){
      try{ const r=await fetch(url); if(!r.ok)throw 0; const j=await r.json(); products=j.products||[]; break; }
      catch(e){ products=[]; }

    if(products.length>=8) break;   // enough local results, stop

  const seen=new Set(); const out=[];

    .filter(x=>x.m.name && x.m.per100 && x.m.per100.kcal>0)

function parseNutritionText(txt){
  const per=foodPer();

  const s=(txt||'').toLowerCase().replace(/(\d)[,](\d)/g,'$1.$2');

  per.fat=after('grasas?(?:\\s*totales)?|l[ií]pidos|fat');

  const eg=effectiveGoals();
  const scopeLabel=isPast?('· '+dayLabel(day)+' (pasado · solo este día)'):isFuture?('· '+dayLabel(day)+' (futuro · default)'):'';
  const micro=(id,lbl,v,ro)=>`<div><label>${lbl}${ro?' <span style="color:var(--good);font-size:8px;font-weight:700">AUTO</span>':''}</label><input id="${id}" type="number" inputmode="decimal" value="${ro?Math.round(v*100)/100:(v?v:'')}"${ro?' disabled style="opacity:.55"':' placeholder="0"'}/></div>`;
  const sl=(k,lbl,pct)=>`<div class="gsl"><div class="gsl-h"><span>${lbl} <button type="button" class="lk" id="lk_${k}" title="fijar">🔒</button></span><span><b id="sp_${k}">${pct}</b>% · <span class="gg" id="sg_${k}">0</span> g</span></div><input type="range" id="sl_${k}" min="0" max="100" value="${pct}" class="gslider"/></div>`;
  openModal(`<h3>edit goals${scopeLabel?' <span style="color:var(--o50);font-weight:400;font-size:11px;letter-spacing:0">'+escTxt(scopeLabel)+'</span>':''}</h3>
   <div class="toggles" id="gm_tog" style="margin-bottom:14px"><button class="t ${window._goalMode==='pct'?'on':''}" data-gm="pct">% de kcal</button><button class="t ${window._goalMode==='grams'?'on':''}" data-gm="grams">gramos</button></div>
   ${goalSecHidden('balance')?'':`<div id="g_bal" class="submeta" style="margin:-6px 0 13px;font-size:11px"></div>`}
   <div id="gm_pct" style="display:${window._goalMode==='pct'?'block':'none'}">
     <div class="field"><label>KCAL · total fijo</label><input id="gp_kcal" type="number" inputmode="numeric" value="${g.kcal?Math.round(g.kcal):''}" placeholder="0"/></div>
     ${sl('protein','proteína',pP)}${sl('carbs','carbohidratos',pC)}${sl('fat','grasa',pF)}
     <div id="gp_sum" class="submeta" style="margin:2px 0 10px"></div>
   </div>
   <div id="gm_grams" style="display:${window._goalMode==='grams'?'block':'none'}">
     <div class="field row3"><div><label>PROT g</label><input id="gg_protein" type="number" inputmode="numeric" value="${g.protein?Math.round(g.protein):''}" placeholder="0"/></div><div><label>CARB g</label><input id="gg_carbs" type="number" inputmode="numeric" value="${g.carbs?Math.round(g.carbs):''}" placeholder="0"/></div><div><label>GRASA g</label><input id="gg_fat" type="number" inputmode="numeric" value="${g.fat?Math.round(g.fat):''}" placeholder="0"/></div></div>
     <div id="gg_kcal" class="submeta" style="margin:2px 0 10px;font-size:13px"></div>
   </div>
   <hr class="rule" style="margin:4px 0 14px"/>
   ${goalSecHidden('electro')?'':`<div class="field row2">${micro('g_sodium','SODIO mg',eg.sodium,1)}${micro('g_potassium','POTASIO mg',eg.potassium,1)}</div>`}
   ${goalSecHidden('sugarfiber')?'':`<div class="field row2">${micro('g_sugar','AZÚCAR g',g.sugar)}${micro('g_fiber','FIBRA g',g.fiber)}</div>`}
   ${goalSecHidden('minor')?'':`<div class="field row2">${micro('g_water','AGUA L',eg.water,1)}${micro('g_caffeine','CAFEÍNA mg',g.caffeine)}</div>
   <div class="submeta" style="font-size:9px;color:var(--o40);margin:-4px 0 8px"><span style="color:var(--good);font-weight:700">AUTO</span> = recalculado de tu actividad real (entrenos últimos 14d + pasos últimos 7d)</div>
   <div class="field row2">${micro('g_alcohol','ALCOHOL g · límite',g.alcohol||0)}${micro('g_sleep','SUEÑO h · meta',g.sleep||8)}</div>`}
   <hr class="rule" style="margin:8px 0 8px"/>
   <div class="submeta" style="font-size:9px;color:var(--o40);margin-bottom:6px">SECCIONES · tap para ocultar/mostrar</div>
   <div class="chips" id="g_sectog" style="margin-bottom:12px">${[['balance','déficit/mant.'],['electro','electrolitos'],['sugarfiber','azúcar/fibra'],['minor','agua/caf/alc/sueño']].map(s=>`<span class="chip" data-act="goalsechtog" data-sec="${s[0]}" style="${goalSecHidden(s[0])?'opacity:.4;text-decoration:line-through':''}">${s[1]}</span>`).join('')}</div>
   <div class="sheetbtns"><button class="ok" data-act="okgoals">save</button><button class="cancel" id="g_tomaint" title="poner kcal objetivo = tu mantenimiento">= mantenim.</button><button class="cancel" id="g_recalc" title="recalcular desde tu perfil + actividad">↻ perfil</button><button class="cancel" data-act="closemodal">cancel</button></div>`);
  const keys=['protein','carbs','fat'], DIV={protein:4,carbs:4,fat:9}, locks={protein:false,carbs:false,fat:false};
  const gr={protein:+g.protein||0, carbs:+g.carbs||0, fat:+g.fat||0};   // GRAMS = source of truth; locks pin grams
  const Kget=()=>parseFloat(val('gp_kcal'))||0;
  const setVal=(id,v)=>{ const e=document.getElementById(id); if(e)e.value=v; };
  const lockedKeys=()=>keys.filter(k=>locks[k]);
  const gbal=()=>{ const K=window._goalMode==='pct'?Kget():((parseFloat(val('gg_protein'))||0)*4+(parseFloat(val('gg_carbs'))||0)*4+(parseFloat(val('gg_fat'))||0)*9); const b=balanceOf(K); const e=document.getElementById('g_bal'); if(!e)return; if(!b){ e.innerHTML='<span style="color:var(--o40)">completa tu perfil para ver déficit / volumen</span>'; return; } e.innerHTML='mantenimiento ≈ <b style="color:var(--fg)">'+b.maint+'</b> kcal · <b style="color:'+b.col+'">'+b.label+'</b>'+(b.label!=='mantenimiento'?' '+Math.abs(b.delta)+' kcal':''); };
  // paint %/grams from gr. skip = the slider being dragged, so its thumb is NOT re-set mid-drag -> smooth, no jumps
  const paint=skip=>{ const K=Kget()||1; let sum=0; keys.forEach(k=>{ const pct=Math.round(gr[k]*DIV[k]/K*100); sum+=pct; const sp=document.getElementById('sp_'+k); if(sp)sp.textContent=pct; const sg=document.getElementById('sg_'+k); if(sg)sg.textContent=Math.round(gr[k]); if(k!==skip){ const r=document.getElementById('sl_'+k); if(r&&+r.value!==pct)r.value=pct; } }); const ps=document.getElementById('gp_sum'); if(ps)ps.innerHTML='total <b style="color:var(--fg)">'+sum+'</b>% · '+Math.round(Kget())+' kcal'; gbal(); };
  const applyLocks=()=>{ keys.forEach(k=>{ const r=document.getElementById('sl_'+k), b=document.getElementById('lk_'+k); if(r)r.disabled=locks[k]; if(b)b.classList.toggle('on',locks[k]); }); };
  // drag an unlocked slider:
  //  • 2 locks (this is the 3rd, free): its % moves AT FIXED grams from locked macros -> KCAL adjusts up/down
  //  • 0-1 locks: keep grams of locked + spread remainder over OTHER unlocked to keep total kcal fixed
  const onDrag=k=>{ if(locks[k])return; const K=Kget(); if(K<=0)return; const pct=parseFloat(val('sl_'+k))||0;
    if(lockedKeys().length===2){ // 2 LOCKED + this draggable -> moving it scales kcal
      const lockedKcal=lockedKeys().reduce((s,x)=>s+gr[x]*DIV[x],0);
      if(pct>=99){ gr[k]=(lockedKcal*99)/DIV[k]/1; }  // safety cap (avoid div-by-zero)
      else { gr[k]=(lockedKcal*pct/100)/(DIV[k]*(1-pct/100)); } // gr*DIV / (gr*DIV+lockedKcal) = pct/100  ->  gr = lockedKcal*pct / (DIV*(100-pct))
      const newK=Math.round(lockedKcal+gr[k]*DIV[k]); setVal('gp_kcal',newK);
      paint(k); return;
    }
    // 0-1 locks: kcal stays, redistribute among the other unlocked
    gr[k]=K*pct/100/DIV[k];
    const lockedKcal=lockedKeys().reduce((s,x)=>s+gr[x]*DIV[x],0); const others=keys.filter(x=>x!==k&&!locks[x]); const remain=Math.max(0,K-lockedKcal-gr[k]*DIV[k]);
    if(others.length===1){ gr[others[0]]=remain/DIV[others[0]]; }
    else if(others.length===2){ const a0=gr[others[0]]*DIV[others[0]], a1=gr[others[1]]*DIV[others[1]], as=a0+a1, p0=as>0?remain*a0/as:remain/2; gr[others[0]]=p0/DIV[others[0]]; gr[others[1]]=(remain-p0)/DIV[others[1]]; }
    paint(k); };
  // kcal total changed: keep locked grams, scale the unlocked grams to hit the new total
  const onKcal=()=>{ const K=Kget(); const lockedKcal=lockedKeys().reduce((s,x)=>s+gr[x]*DIV[x],0); const unl=keys.filter(x=>!locks[x]); const cur=unl.reduce((s,x)=>s+gr[x]*DIV[x],0); const target=Math.max(0,K-lockedKcal); if(cur>0){ const sc=target/cur; unl.forEach(x=>gr[x]*=sc); } else if(unl.length){ unl.forEach(x=>gr[x]=(target/unl.length)/DIV[x]); } paint(); };
  const toggleLock=k=>{ if(!locks[k]&&lockedKeys().length>=2)return; locks[k]=!locks[k]; applyLocks(); paint(); };
  keys.forEach(k=>{ const e=document.getElementById('sl_'+k); if(e)e.addEventListener('input',()=>onDrag(k)); const b=document.getElementById('lk_'+k); if(b)b.onclick=()=>toggleLock(k); });
  const gpk=document.getElementById('gp_kcal'); if(gpk)gpk.addEventListener('input',onKcal);
  const gkc=()=>{ const P=parseFloat(val('gg_protein'))||0,C=parseFloat(val('gg_carbs'))||0,F=parseFloat(val('gg_fat'))||0; const e=document.getElementById('gg_kcal'); if(e)e.innerHTML='= <b style="color:var(--fg)">'+Math.round(P*4+C*4+F*9)+'</b> kcal'; gbal(); };
  ['gg_protein','gg_carbs','gg_fat'].forEach(id=>{ const e=document.getElementById(id); if(e)e.addEventListener('input',gkc); });
  applyLocks(); onKcal(); gkc();   // normalize grams to the kcal total on open so the split sums to 100%
  document.querySelectorAll('#gm_tog [data-gm]').forEach(b=>b.onclick=()=>{ const mode=b.dataset.gm; if(mode===window._goalMode)return;
    if(mode==='grams'){ setVal('gg_protein',Math.round(gr.protein)); setVal('gg_carbs',Math.round(gr.carbs)); setVal('gg_fat',Math.round(gr.fat)); gkc(); }
    else { gr.protein=parseFloat(val('gg_protein'))||0; gr.carbs=parseFloat(val('gg_carbs'))||0; gr.fat=parseFloat(val('gg_fat'))||0; setVal('gp_kcal',Math.round(gr.protein*4+gr.carbs*4+gr.fat*9)); paint(); }
    window._goalMode=mode; document.querySelectorAll('#gm_tog [data-gm]').forEach(x=>x.classList.toggle('on',x.dataset.gm===mode)); document.getElementById('gm_pct').style.display=mode==='pct'?'block':'none'; document.getElementById('gm_grams').style.display=mode==='grams'?'block':'none'; });
  document.querySelector('[data-act="okgoals"]').onclick=()=>{ let kcal,P,C,F;
    if(window._goalMode==='pct'){ P=gr.protein; C=gr.carbs; F=gr.fat; kcal=Kget()||(P*4+C*4+F*9); }
    else { P=parseFloat(val('gg_protein'))||0; C=parseFloat(val('gg_carbs'))||0; F=parseFloat(val('gg_fat'))||0; kcal=P*4+C*4+F*9; }
    g.kcal=Math.round(kcal); g.protein=Math.round(P); g.carbs=Math.round(C); g.fat=Math.round(F);
    ['sugar','fiber','caffeine','alcohol','sleep'].forEach(k=>{ const v=parseFloat(val('g_'+k)); if(!isNaN(v))g[k]=v; });   // Na/K/water are AUTO from derivedActivity()
    if(isPast){ db.goalHist=db.goalHist||{}; db.goalHist[day]=g; }            // past: only this day
    else { Object.assign(db.settings.goals, g); db.goalHist=db.goalHist||{}; db.goalHist[day]=Object.assign({},db.settings.goals); } // present/future: update current goal AND today/that-day's snapshot
    save(); closeModal(); render(); };
  const grc=document.getElementById('g_recalc'); if(grc)grc.onclick=()=>{ if(!db.profile||!db.profile.weightKg){ alert('Completa tu perfil primero (settings → perfil).'); return; } if(!confirm('¿Recalcular TODAS las metas desde tu perfil y nivel de actividad? Sobrescribe tus ajustes manuales.'+(isPast?' Solo aplica a este día.':'')))return;
    const fresh=recalcGoals(db.profile);
    if(isPast){ db.goalHist=db.goalHist||{}; db.goalHist[day]=fresh; }
    else { db.settings.goals=fresh; db.goalHist=db.goalHist||{}; db.goalHist[day]=Object.assign({},fresh); }
    save(); closeModal(); openGoals(); };
  // "= mantenimiento": precarga el kcal objetivo = TDEE de mantenimiento (vivo del perfil); NO auto-guarda, el usuario revisa y da save
  const gtm=document.getElementById('g_tomaint'); if(gtm)gtm.onclick=()=>{ const m=maintenanceKcal(); if(!m){ alert('Completa tu perfil primero (peso, altura, edad) para calcular tu mantenimiento.'); return; }
    if(window._goalMode==='grams'){ const P=parseFloat(val('gg_protein'))||0,C=parseFloat(val('gg_carbs'))||0,F=parseFloat(val('gg_fat'))||0,cur=P*4+C*4+F*9; if(cur>0){ const sc=m/cur; setVal('gg_protein',Math.round(P*sc)); setVal('gg_carbs',Math.round(C*sc)); setVal('gg_fat',Math.round(F*sc)); } else { setVal('gg_carbs',Math.round(m/4)); } gkc(); }
    else { setVal('gp_kcal',m); onKcal(); } };
}

  document.querySelector('[data-act="syimport"]').onclick=()=>{ try{const d=JSON.parse(ta.value); if(!d.split)throw 0; if(!confirmReplace(d))return; db=migrate(d); save(); closeModal(); go('home'); alert('Datos importados.'); }catch(e){ alert('Texto inválido.'); } };
}

  const blob=new Blob([JSON.stringify(db,null,2)],{type:'application/json'});

function doImport(){

// ---------- init ----------
function loadScript(src,integrity){ return new Promise((res,rej)=>{ const ex=document.querySelector('script[data-x="'+src+'"]'); if(ex&&ex.dataset.ok){res();return;} if(ex)ex.remove(); const s=document.createElement('script'); s.src=src; if(integrity){ s.integrity=integrity; s.crossOrigin='anonymous'; } s.setAttribute('data-x',src); const to=setTimeout(()=>{ try{s.remove();}catch(_){} rej(new Error('timeout')); },15000); s.onload=()=>{ clearTimeout(to); s.dataset.ok='1'; res(); }; s.onerror=()=>{ clearTimeout(to); try{s.remove();}catch(_){} rej(new Error('load fail')); }; document.head.appendChild(s); }); }
// downscale + grayscale + contrast → much better/faster OCR on phone photos
function prepImage(file){ return new Promise(res=>{
  const img=new Image(); const url=URL.createObjectURL(file);
  img.onload=()=>{ const max=1600; let{width:w,height:h}=img; const sc=Math.min(1,max/Math.max(w,h)); w=Math.round(w*sc); h=Math.round(h*sc);
    const c=document.createElement('canvas'); c.width=w; c.height=h; const cx=c.getContext('2d'); cx.drawImage(img,0,0,w,h);
    try{ const d=cx.getImageData(0,0,w,h),a=d.data; for(let i=0;i<a.length;i+=4){ let g=0.299*a[i]+0.587*a[i+1]+0.114*a[i+2]; g=(g-128)*1.4+128; g=g<0?0:g>255?255:g; a[i]=a[i+1]=a[i+2]=g; } cx.putImageData(d,0,0); }catch(_){}
    URL.revokeObjectURL(url); res(c); };
  img.onerror=()=>{ URL.revokeObjectURL(url); res(file); };
  img.src=url; }); }
async function ocrPhoto(file,barcode){ if(!file)return; window._faTag=window._faTag||curTag();
  openModal('<h3>reading label…</h3><div id="ocr_msg" class="submeta">cargando OCR (unos segundos la 1ª vez)…</div>');
  try{ await loadScript('https://cdn.jsdelivr.net/npm/tesseract.js@5.0.4/dist/tesseract.min.js','sha384-Ptw8HCYAWF6vIop6WuGxfSCiDCIzUWqjrHYfx8Vd0S4CMBaicAdBh2y+Ufle664A');
    const mm=document.getElementById('ocr_msg');
    const src=await prepImage(file);
    const {data}=await Tesseract.recognize(src,'eng+spa',{logger:p=>{ if(mm&&p.status==='recognizing text') mm.textContent='leyendo… '+Math.round(p.progress*100)+'%'; }});
    const text=data.text||'';
    openVerify({name:'',serving:'1 serving',barcode:barcode||'',per:parseNutritionText(text)},{isNew:true,tag:window._faTag,ocrText:text});
  }catch(e){ const mm=document.getElementById('ocr_msg'); if(mm)mm.textContent='no se pudo leer la foto · usa text o manual'; }
}
// ---- AI label reading (Gemini via Cloudflare Worker proxy) ----
function fileToDataURL(file,maxDim,q){ maxDim=maxDim||1280; q=q||0.82; return new Promise(res=>{
  const img=new Image(); const url=URL.createObjectURL(file);
  img.onload=()=>{ let w=img.width,h=img.height; const sc=Math.min(1,maxDim/Math.max(w,h)); w=Math.max(1,Math.round(w*sc)); h=Math.max(1,Math.round(h*sc));
    const c=document.createElement('canvas'); c.width=w; c.height=h; c.getContext('2d').drawImage(img,0,0,w,h);
    URL.revokeObjectURL(url); let out=null; try{ out=c.toDataURL('image/jpeg',q); }catch(_){} res(out); };
  img.onerror=()=>{ URL.revokeObjectURL(url); res(null); };
  img.src=url; }); }
function sanitizePer(o){ const p=foodPer(); if(o&&typeof o==='object'){ for(const k in p){ const v=parseFloat(o[k]); if(!isNaN(v)&&isFinite(v)) p[k]=v<0?0:v; } } return p; }
function labelFallback(msgEl,barcode,reason){ if(!msgEl)return;
  msgEl.innerHTML=(reason||'no se pudo leer la etiqueta')+'<div class="secondary" style="margin-top:10px"><button class="b" id="ai_retry"> otra foto</button><button class="b" id="ai_text">¶ texto</button><button class="b" id="ai_man"> manual</button></div>';
  const pick=()=>{ const inp=document.createElement('input'); inp.type='file'; inp.accept='image/*'; inp.setAttribute('capture','environment'); inp.onchange=()=>{ if(inp.files&&inp.files[0]) labelPhoto(inp.files[0],barcode); }; inp.click(); };
  const r=document.getElementById('ai_retry'); if(r)r.onclick=pick;
  const tx=document.getElementById('ai_text'); if(tx)tx.onclick=()=>openTextParse();
  const mn=document.getElementById('ai_man'); if(mn)mn.onclick=()=>{ if(barcode)window._linkBarcode=barcode; openVerify({name:'',base:'g',per100:{},sizes:{},barcode:barcode||''},{isNew:true,tag:window._faTag||curTag()}); };
}
async function aiPhoto(file,barcode){ if(!file)return; window._faTag=window._faTag||curTag();
  openModal('<h3>analizando…</h3><div id="ai_msg" class="submeta">leyendo la etiqueta con IA…</div>');
  const msg=()=>document.getElementById('ai_msg');
  try{
    const dataUrl=await fileToDataURL(file); if(!dataUrl) throw new Error('imagen inválida');
    const ctrl=new AbortController(); const to=setTimeout(()=>ctrl.abort(),30000); let r;
    try{ r=await fetch(AI_PROXY_URL,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({image:dataUrl,barcode:barcode||''}),signal:ctrl.signal}); }
    finally{ clearTimeout(to); }
    if(!r.ok) throw new Error('servidor '+r.status);
    const j=await r.json(); if(!j||!j.ok||!j.data) throw new Error((j&&j.error)||'sin datos');
    const d=j.data; const per=sanitizePer(d.per); const found=Array.isArray(d.found)?d.found.filter(Boolean):[];
    if(!(found.length||per.kcal||per.protein||per.carbs||per.fat)){ labelFallback(msg(),barcode,'la IA no encontró valores en esa foto. Acerca la tabla, de frente y con buena luz.'); return; }
    const basis=d.basis||'serving';
    const food=normalizeExtract({name:d.name,basis:basis,serving:d.serving,serving_g:d.serving_g,serving_label:d.serving_label,piece_g:d.piece_g,pieces_per_container:d.pieces_per_container,container_g:d.container_g,servings_per_container:d.servings_per_container,per:per});
    food.barcode=barcode||'';
    const summary='IA leyó '+(found.length||'varios')+' campos'+(d.serving?' · porción: '+d.serving:'')+(basis!=='serving'?' · base impresa: '+basis:'')+(found.length?('\ncampos: '+found.join(', ')):'')+'.\nahora se guarda por 100 '+food.base+' · revisa los números.';
    openVerify(food,{isNew:true,tag:window._faTag,ocrText:summary});
  }catch(e){ labelFallback(msg(),barcode,(e&&e.name==='AbortError')?'tardó demasiado · reintenta':('no se pudo analizar ('+((e&&e.message)||'error')+')')); }
}
// Pick AI when the proxy is configured, else on-device OCR.
function labelPhoto(file,barcode){ if(AI_PROXY_URL) return aiPhoto(file,barcode); return ocrPhoto(file,barcode); }

applyDesign(); try{ if(/[?&]design\b/.test(location.search))localStorage.setItem('gymtrk_designmode','1'); if(localStorage.getItem('gymtrk_designmode')==='1')openDesignPanel(); }catch(_){}

// rest timer tick: writes textContent only (never re-renders); recompute on return from background (iOS freezes timers)
setInterval(()=>{try{updateRestBar();}catch(_){}} ,500);
document.addEventListener('visibilitychange',()=>{ if(!document.hidden){ try{updateRestBar();}catch(_){} } });
// Service worker with AUTO-UPDATE: when a new version is found, activate it and reload once.
// Fixes iOS PWA serving stale cached builds from the home-screen icon.
if('serviceWorker' in navigator){
  window.addEventListener('load',()=>{
    navigator.serviceWorker.register('sw.js').then(reg=>{
      // check for updates on load and whenever the app regains focus
      reg.update().catch(()=>{});
      document.addEventListener('visibilitychange',()=>{ if(!document.hidden) reg.update().catch(()=>{}); });
      reg.addEventListener('updatefound',()=>{
        const nw=reg.installing; if(!nw)return;
        nw.addEventListener('statechange',()=>{
          if(nw.state==='installed' && navigator.serviceWorker.controller){
            // a newer build is ready → take over and reload once
            nw.postMessage&&nw.postMessage('skipWaiting');
          }
        });
      });
    }).catch(()=>{});
    let reloaded=false;
    navigator.serviceWorker.addEventListener('controllerchange',()=>{
      if(reloaded)return; reloaded=true; location.reload();
    });
  });
}
