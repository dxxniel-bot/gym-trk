<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
<title>gym//TRK</title>
<link rel="manifest" href="manifest.json"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black"/>
<meta name="apple-mobile-web-app-title" content="gym//TRK"/>
<meta name="theme-color" content="#0c0c0c"/>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;700;800&display=swap" rel="stylesheet" />
<style>
  :root{
    --bg:#000; --frame:#000; --fg:#f3f3f4;
    --o60:rgba(243,243,244,.66); --o50:rgba(243,243,244,.56); --o40:rgba(243,243,244,.5);
    --o35:rgba(243,243,244,.46); --o30:rgba(243,243,244,.4); --o20:rgba(243,243,244,.26);
    --o12:rgba(243,243,244,.1); --o10:rgba(243,243,244,.06);
    --faint:#3a3a3e; --line:rgba(243,243,244,.08); --track:#191920; --fill:#f3f3f4; --abort:rgba(190,110,110,.55);
    --card:#0d0d10; --card2:#16161c; --border:rgba(243,243,244,.09); --radius:16px;
    --good:#46c98b; --bad:#e5675c; --warn:#e3b34f; --info:#6aa6ff;
  }
  *{margin:0;padding:0;box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
  :focus{outline:none;}
  :focus-visible{outline:1.5px solid var(--fg); outline-offset:2px;}
  @media (prefers-reduced-motion:reduce){ *{transition-duration:.01ms!important; animation-duration:.01ms!important; scroll-behavior:auto!important;} }
  html{height:100%;}
  body{background:var(--bg); color:var(--fg);
    font-family:"JetBrains Mono",ui-monospace,Menlo,monospace;
    position:fixed; inset:0; overflow:hidden; overscroll-behavior:none;
    display:flex; flex-direction:column; align-items:center; justify-content:center;
    -webkit-font-smoothing:antialiased; touch-action:manipulation;
    -webkit-user-select:none; user-select:none;}
  .frame{position:relative; width:393px; height:852px; max-width:100%; max-height:100%; background:var(--frame); overflow:hidden;
    border-radius:2px; box-shadow:0 0 0 1px #000,0 24px 60px rgba(0,0,0,.6);
    display:flex; flex-direction:column;}
  /* on a real phone: frame fills the screen, no floating card */
  @media (max-width:440px){ body{display:block;} .frame{width:100%; height:100%; max-height:none; border-radius:0; box-shadow:none;} }
  input,select,textarea{font-size:16px; -webkit-user-select:text; user-select:text;}
  .scroll{flex:1; overflow-y:auto; -webkit-overflow-scrolling:touch; overscroll-behavior-y:contain; padding:22px 18px calc(34px + env(safe-area-inset-bottom));}
  .scroll::-webkit-scrollbar{width:6px} .scroll::-webkit-scrollbar-thumb{background:var(--o10)}
  input,select,button{font-family:inherit;}

  /* status bar */
  .status{display:flex; justify-content:space-between; align-items:flex-start; font-size:10px; color:var(--o50);}
  .status .uname{font-weight:800; font-size:12px; color:var(--fg);}
  .status .back{display:inline-block; margin-top:7px; font-size:11px; color:var(--o60); border:1px solid var(--o20); padding:7px 10px; cursor:pointer;}
  .status .center{text-align:center; line-height:1.4;}
  .status .streak{font-size:12px; font-weight:800; color:var(--o50);}
  .status b{color:var(--o60); font-weight:500;}

  .rule{border:0; border-top:1px solid var(--line); margin:18px 0;}

  /* rotation */
  .rot{display:flex; justify-content:space-between; align-items:center; margin:14px 0 10px;}
  .rot .lbl{font-size:10px; color:var(--o60); letter-spacing:.5px;} .rot .n{font-size:10px; color:var(--o40);}
  .segs{display:flex; gap:3px; margin-bottom:13px;} .segs i{flex:1; height:4px; background:var(--track); cursor:pointer;} .segs i.on{background:var(--fill);}
  .rot .arrow{cursor:pointer; color:var(--o60); padding:0 5px;}
  .ctrls{display:flex; gap:14px; font-size:9px; margin-bottom:22px;} .ctrls a{color:var(--o50); cursor:pointer;}

  /* section header (stacked label + name) */
  .whdr{display:grid; grid-template-columns:auto 1fr; column-gap:8px; row-gap:3px; align-items:baseline; margin-bottom:8px;}
  .whdr .l1,.whdr .l2{grid-column:1; justify-self:end; text-align:right; font-size:16px; font-weight:800; line-height:1; letter-spacing:2px; color:var(--o50);}
  .whdr .l1{grid-row:1;} .whdr .l2{grid-row:2;} .whdr .l1 .s{color:var(--o50);}
  .whdr .wname{grid-column:2; grid-row:1; font-size:22px; font-weight:800; letter-spacing:-.3px; line-height:1;}
  .whdr .wmeta{grid-column:2; grid-row:2; font-size:8px; color:var(--o50); line-height:1; letter-spacing:.2px;}
  .wgym{text-align:center; font-size:10px; color:var(--o40); margin-top:8px;}

  .section{display:flex; align-items:baseline; justify-content:space-between; margin-bottom:14px;}
  .section .h{font-size:16px; font-weight:800;} .section .h .s{color:var(--o50);}
  .section .meta{font-size:11px; color:var(--o50); cursor:pointer; padding:6px 4px;}

  /* CTA buttons */
  .cta{margin-top:18px;}
  .start{display:block; width:100%; text-align:center; background:var(--fill); color:#000; font-weight:700; font-size:13px; padding:13px 0; letter-spacing:.3px; border:0; cursor:pointer;}
  .secondary{display:flex; gap:10px; margin-top:10px;}
  .secondary .b{flex:1; text-align:center; font-size:12px; color:var(--fg); border:1px solid var(--faint); padding:13px 0; background:transparent; cursor:pointer; letter-spacing:.3px;}
  .secondary .b:active{background:var(--o10);}

  /* prev + stats lists */
  .line{display:flex; align-items:baseline; gap:10px; font-size:11px; padding:3px 0;}
  .line .k{color:var(--o60);} .line .dots{flex:1; border-bottom:1px dotted var(--line); transform:translateY(-3px);} .line .v{color:var(--fg);}
  .line.stat .k{color:var(--o50);} .line.stat .v{font-weight:700;}
  .vrow{margin-bottom:11px;} .vtop{display:flex;justify-content:space-between;align-items:baseline;font-size:11px;margin-bottom:5px;} .vm{color:var(--fg);} .vn{color:var(--o50);font-size:9px;} .vd{color:var(--o40);}
  .vst{font-size:8px;padding:0 4px;border:.5px solid var(--o20);margin-left:2px;} .vst.under{color:var(--o40);} .vst.optimal{color:var(--fill);border-color:var(--o40);} .vst.high{color:#c8a24d;border-color:#c8a24d;} .vst.over{color:#c8553d;border-color:#c8553d;}
  .vbar{position:relative;height:5px;background:var(--track);} .vbar>i{display:block;height:100%;background:var(--fill);} .vbar .mev,.vbar .mav{position:absolute;top:-1px;width:1px;height:7px;background:var(--o40);}
  .submeta{font-size:10px; color:var(--o40); padding-top:4px;}
  .rowend{display:flex; justify-content:space-between; align-items:baseline; margin-top:12px; font-size:10px; color:var(--o50);} .rowend .view{color:var(--o60); cursor:pointer;}

  /* macros rings */
  .hero{width:100%; background:none; border:0; color:inherit; font:inherit; display:flex; flex-direction:column; align-items:center; cursor:pointer;}
  .ring{position:relative;} .ring svg{display:block; width:100%; height:100%;}
  .ring-track{fill:none; stroke:var(--track); transition:stroke .28s ease;} .ring-fill{fill:none; stroke:var(--fill); stroke-linecap:round; transition:stroke-dasharray .32s ease, stroke .28s ease;}
  .ring-center{position:absolute; inset:0; display:flex; flex-direction:column; align-items:center; justify-content:center; line-height:1;}
  .ring.lg{width:132px; height:132px;} .ring.lg .ring-track,.ring.lg .ring-fill{stroke-width:1.9;} .ring.lg .num{font-size:26px; font-weight:800; letter-spacing:-1px;} .ring.lg .of{font-size:10px; color:var(--o40); margin-top:6px;}
  .ring.md{width:72px; height:72px;} .ring.md .ring-track,.ring.md .ring-fill{stroke-width:2.2;} .ring.md .num{font-size:13px; font-weight:700;}
  .hero-meta{margin-top:13px; font-size:10px; color:var(--o40); display:flex; gap:8px; align-items:center;} .hero-meta .left{color:var(--o60);} .chev{font-size:9px; color:var(--faint); transition:transform .2s;} .hero.open .chev{transform:rotate(180deg);}
  .rings{display:flex; justify-content:space-between; padding:0 4px;} .cell{display:flex; flex-direction:column; align-items:center; text-align:center; flex:1;}
  .cap{font-size:10px; color:var(--fg); margin-top:9px;} .sub{font-size:9px; color:var(--o40); margin-top:2px;}
  .cell{cursor:pointer;}
  /* remaining: TRUE inversion — full ring = bright (fill color), consumed arc = dark notch, only remaining arc glows */
  .ring.inv .ring-track{stroke:var(--fill);} .ring.inv .ring-fill{stroke:var(--bg);}
  .ring.inv .ring-center .num{color:var(--o60); transition:color .25s;}
  .cell .sub{transition:color .25s;} .cell .cap{transition:color .25s;}
  .grp-label{font-size:9px; color:var(--o50); letter-spacing:1.5px; margin-bottom:14px;}
  .mrow{display:grid; grid-template-columns:78px 1fr auto; align-items:center; column-gap:14px; margin-top:16px; font-size:11px;}
  .mrow:first-of-type{margin-top:0;} .mrow .ml{color:var(--o50);} .mrow .mv{color:var(--o60); font-size:10px; white-space:nowrap;} .mrow .mv .g{color:var(--o40);}
  .bar{height:4px; background:var(--track);} .bar>i{display:block; height:100%; background:var(--fill);}
  .pill{font-size:9px; color:var(--o50); border:1px solid var(--faint); padding:1px 5px; margin-left:6px;}

  /* food log — grid 3-col: name | macros(76px) | kcal(40px) */
  .grp{margin-bottom:14px;}
  .ghead,.item{display:grid; grid-template-columns:1fr 76px 40px; column-gap:8px; align-items:baseline; padding:0 0 0 22px; font-size:10px; margin-bottom:0;}
  .ghead{color:var(--o50); margin-bottom:7px; padding-bottom:0;}
  .ghead .hash{color:var(--faint);}
  .ghead .gmac{color:var(--o40); font-size:9px; text-align:right;}
  .ghead .gkc{color:var(--fg); font-size:13px; font-weight:800; text-align:right;}
  .item{padding:11px 0 11px 22px; font-size:11px; cursor:pointer;}
  .item:active{background:var(--o10);}
  .item .nm{color:var(--o60); overflow:hidden; text-overflow:ellipsis; white-space:nowrap;}
  .item .nm .q{color:var(--fg); font-weight:700; margin-right:6px;} .item .nm .br{color:var(--o35); font-size:9px; margin-left:4px;}
  .item .macq{color:var(--o40); font-size:9px; text-align:right; white-space:nowrap;}
  .item .kc{color:var(--o50); font-size:10px; font-weight:400; text-align:right;}
  .fab{position:fixed; right:18px; bottom:calc(76px + env(safe-area-inset-bottom)); width:56px; height:56px; border-radius:50%; background:var(--fg); color:#0c0c0c; border:none; font-size:30px; font-weight:300; line-height:0; display:flex; align-items:center; justify-content:center; box-shadow:0 3px 16px rgba(0,0,0,.55); z-index:4; cursor:pointer;}
  .fab:active{transform:scale(.93);}

  /* workout sets table */
  .wprog{height:2px; background:var(--o10); margin:8px 0 0;} .wprog>i{display:block; height:100%; background:var(--fill);}
  .mgroup{margin-top:26px;} .mhead{font-size:11px; color:var(--o50); margin-bottom:15px;}
  .mbody{border-left:1px solid var(--o12); padding-left:14px; margin-left:4px;}
  .ex{margin-bottom:15px;} .ex:last-child{margin-bottom:0;}
  .exhead{display:flex; align-items:baseline; flex-wrap:wrap; gap:7px; margin-bottom:9px;} .exhead .n{font-size:16px; font-weight:800;} .exhead .mch{font-size:11px; color:var(--o50); cursor:pointer; border-bottom:.5px dashed var(--o20);} .exhead .mch.empty{color:var(--o35); border-bottom:none;} .exhead .mch:active{color:var(--fg);} .exhead .mset{font-size:10px; color:var(--o40); cursor:pointer;} .exhead .note{font-size:10px; color:var(--o35);}
  .thead,.srow{display:grid; gap:4px; align-items:center;} .thead{margin-bottom:6px;} .thead .cl{font-size:9px; color:var(--o40); text-align:center; letter-spacing:.5px;} .thead .cl.w{text-align:left; padding-left:2px;}
  .gc-free{grid-template-columns:22px 1fr 38px 44px 40px 18px;} .gc-mach{grid-template-columns:22px 26px 1fr 38px 44px 40px 18px;} .gc-uni{grid-template-columns:20px 1fr 38px 44px 40px 18px;}
  .srow{margin-bottom:5px;} .setn{font-size:11px; color:var(--o50); text-align:center; cursor:pointer;} .setn.done{color:var(--fill); font-weight:700;}
  .side{font-size:10px; font-weight:700; color:var(--o50); text-align:center;}
  .inp{height:30px; border:.5px solid var(--o20); background:transparent; color:var(--fg); text-align:center; font-size:12px; width:100%;} .inp.weight{text-align:left; padding-left:8px;}
  .pick{height:30px; border:.5px solid var(--o20); background:transparent; color:var(--fg); font-size:12px; text-align:center; text-align-last:center; appearance:none; -webkit-appearance:none; width:100%; cursor:pointer;}
  .pick option{background:#0c0c0c; color:var(--fg);}
  .fs{height:30px; border:.5px solid var(--o20); background:transparent; color:var(--o50); font-size:9px; cursor:pointer;} .fs.on{background:var(--o12); color:var(--fg);}
  .del{font-size:14px; color:var(--o40); text-align:center; cursor:pointer; background:none; border:0; height:30px; line-height:30px; padding:0;}
  .pair{display:flex; align-items:center; gap:4px; margin-bottom:5px;} .pair .setn{width:22px; flex:0 0 22px;} .pair .prows{flex:1;}
  /* prev session full preview */
  .prevsess{margin-top:12px;} .psd{margin-bottom:11px;} .psd:last-child{margin-bottom:2px;}
  .psd .pex{font-size:13px; font-weight:700; color:var(--fg); margin-bottom:3px;} .psd .pex .pm{font-size:10px; font-weight:400; color:var(--o40);}
  .psd .psets{font-size:11px; color:var(--o60); line-height:1.6;} .psets .pr{color:var(--o40);} .psets .pk{color:var(--o40); font-weight:700;} .psets .pdot{color:var(--o30);}
  .addrow{display:grid; gap:4px; margin-top:9px;} .addrow.afree{grid-template-columns:22px 1fr 38px 44px 40px 18px;} .addrow.amach{grid-template-columns:22px 26px 1fr 38px 44px 40px 18px;} .addrow.auni{grid-template-columns:22px 20px 1fr 38px 44px 40px 18px;}
  .addbtn{font-size:9px; color:var(--o60); background:none; border:0; cursor:pointer; white-space:nowrap; text-align:left; padding:0;}
  .aleft{display:flex; gap:16px;} .addrow.afree .aleft{grid-column:2/6;} .addrow.amach .aleft{grid-column:2/6;} .addrow.auni .aleft{grid-column:3/6;}
  .addrow.afree .aex{grid-column:5/7; justify-self:end;} .addrow.amach .aex{grid-column:6/7; justify-self:end;} .addrow.auni .aex{grid-column:6/7; justify-self:end;}

  /* footer (workout) */
  .footer{flex:0 0 auto; display:flex; gap:10px; padding:12px 16px; border-top:1px solid var(--o12); background:var(--frame);}
  .footer .abort{font-size:10px; color:var(--o60); border:1px solid var(--abort); padding:9px 16px; background:none; cursor:pointer;}
  .footer .save{flex:1; text-align:center; font-size:10px; font-weight:700; color:#000; background:var(--fill); padding:9px 0; border:0; cursor:pointer;}

  /* nav */
  .nav{flex:0 0 60px; display:flex; align-items:center; justify-content:center; gap:10px; background:var(--frame); border-top:1px solid var(--line); font-size:12px;}
  .nav a{color:var(--o50); cursor:pointer; letter-spacing:.4px; padding:11px 14px; border-radius:2px;} .nav a.active{background:var(--fill); color:#000; font-weight:700;}

  /* modal / forms */
  .modal{position:absolute; inset:0; background:rgba(0,0,0,.6); display:flex; align-items:flex-start; z-index:5;}
  .sheet{width:100%; background:#0c0c0c; border-top:1px solid var(--o20); padding:16px 18px 22px; max-height:80%; overflow-y:auto;}
  #bc_cam video{width:100%; height:auto; display:block;} #bc_cam canvas.drawingBuffer{display:none;}
  .sheet h3{font-size:11px; color:var(--o50); letter-spacing:1px; margin-bottom:14px; font-weight:800;}
  .field{margin-bottom:12px;} .field label{display:block; font-size:9.5px; color:var(--o40); letter-spacing:.5px; margin-bottom:5px;}
  .field input,.field select{width:100%; height:42px; border:.5px solid var(--o20); background:transparent; color:var(--fg); font-size:16px; padding:0 10px; appearance:none;}
  .field.row2{display:grid; grid-template-columns:1fr 1fr; gap:10px;}
  .toggles{display:flex; gap:8px;} .toggles button{flex:1; height:40px; border:.5px solid var(--o20); background:transparent; color:var(--o50); font-size:12px; cursor:pointer;} .toggles button.on{background:var(--fill); color:#000;}
  .toggles.wrap{flex-wrap:wrap;} .toggles.wrap button{flex:1 1 44%;}
  .chips{display:flex;flex-wrap:wrap;gap:7px;margin-top:8px;} .chip{font-size:11px;color:var(--o50);border:.5px solid var(--o20);padding:8px 11px;cursor:pointer;} .chip:active{background:var(--o12);}
  .seday{border-left:1px solid var(--o12);padding-left:12px;margin:0 0 18px 2px;} .sehead{display:flex;align-items:center;gap:8px;margin-bottom:8px;} .senm{flex:1;background:transparent;border:none;border-bottom:.5px solid var(--o20);color:var(--fg);font:inherit;font-size:15px;font-weight:800;padding:2px 0;}
  .seex{display:flex;align-items:baseline;justify-content:space-between;gap:8px;padding:4px 0;} .seexn{flex:1;font-size:12px;color:var(--o60);cursor:pointer;} .seexn .seexm{font-size:9px;color:var(--o40);} .sedel{color:var(--o30);cursor:pointer;font-size:13px;padding:0 4px;}
  .seadd{font-size:9px;color:var(--o50);cursor:pointer;padding:5px 0;}
  .srowm{display:grid;grid-template-columns:30px 1fr 1fr 1fr;gap:6px;align-items:center;margin-bottom:5px;} .srowm .sn{font-size:10px;color:var(--o50);text-align:center;} .srowm .sm{height:28px;background:transparent;border:.5px solid var(--o20);color:var(--fg);font:inherit;font-size:13px;text-align:center;}
  .sheetbtns{display:flex; gap:10px; margin-top:10px;} .sheetbtns .ok{flex:1; height:46px; background:var(--fill); color:#000; font-weight:700; border:0; font-size:13px; cursor:pointer;} .sheetbtns .cancel{height:46px; padding:0 18px; border:1px solid var(--o20); background:none; color:var(--o60); font-size:12px; cursor:pointer;}
  .pickitem{padding:14px 6px; font-size:14px; border-bottom:1px solid var(--line); cursor:pointer;} .pickitem:hover{color:#fff;} .pickitem:active{background:var(--o10);}

  .empty{font-size:11px; color:var(--o40); text-align:center; padding:30px 0;}
  .caption{font-size:10px; color:var(--o40);} .caption b{color:var(--o60);}

  /* ===== rimu-inspired card system (JetBrains Mono kept) ===== */
  .card{background:var(--card); border:1px solid var(--border); border-radius:var(--radius); padding:15px; margin-bottom:12px;}
  /* food-log meal groups become rounded cards */
  .grp{background:var(--card); border:1px solid var(--border); border-radius:var(--radius); padding:4px 14px; margin-bottom:12px;}
  .ghead{padding:12px 0 10px; margin-bottom:0; border-bottom:1px solid var(--border);}
  .grp .item{padding:12px 2px;} .grp .item:not(:last-child){border-bottom:1px solid var(--border);}
  .item:active{background:var(--card2);}
  /* rounded controls */
  .start{border-radius:13px; font-weight:600;}
  .secondary .b{border-radius:13px; border-color:var(--border);} .secondary .b:active{background:var(--card2);}
  .field input,.field select{border-radius:11px; background:var(--card); border:1px solid var(--border);}
  .field input::placeholder{color:var(--o30);}
  /* bottom sheet + buttons */
  .sheet{border-radius:0 0 22px 22px; background:#0a0a0c; border-top:0; border-bottom:1px solid var(--border); padding-top:calc(14px + env(safe-area-inset-top));}
  .sheetbtns .ok{border-radius:13px;} .sheetbtns .cancel{border-radius:13px; border-color:var(--border);}
  .pickitem{border-bottom-color:var(--border);}
  /* pill chips & toggles */
  .chip{border-radius:999px; border-color:var(--border);}
  .toggles button{border-radius:11px; border-color:var(--border);} .toggles button.on{background:var(--fill); color:#000;}
  /* bottom nav as pill tabs */
  .nav{border-top:1px solid var(--border); gap:6px;}
  .nav a{border-radius:999px; padding:10px 16px;} .nav a.active{background:var(--fill); color:#000; font-weight:700;}
  /* rounded progress bars */
  .bar,.wprog,.vbar{border-radius:999px;} .bar>i,.wprog>i,.vbar>i{border-radius:999px;}
  /* workout sets table: terminal style (sharp, dense) — like Expo/ironLOG */
  .inp,.pick,.fs,.srowm .sm{border-radius:2px; border-color:var(--o20);}
  .senm{border-bottom-color:var(--border);} .seday{border-left-color:var(--border);} .mbody{border-left-color:var(--border);}
  /* fab */
  .fab{background:var(--fill); color:#000; box-shadow:0 4px 22px rgba(0,0,0,.7);}
  /* tiny tracked section labels (rimu style) */
  .grp-label{color:var(--o40); letter-spacing:2.5px;}
  /* subtle ascii cursor kept on the landing wordmark */
  .cur::after{content:"▌"; color:var(--o50); margin-left:3px; animation:blink 1.15s step-end infinite;}
  @keyframes blink{50%{opacity:0}}
  @media (prefers-reduced-motion:reduce){ .cur::after{animation:none;} }
  .rule{border-top-color:var(--line); margin:18px 0;}

  /* add-food: recents fill, controls pinned at bottom, equal buttons */

  .fa-ctrls{border-top:1px solid var(--border); padding-top:10px; margin-top:6px;}

  .fa-btns{display:flex; gap:8px;} .fa-btns .b{flex:1 1 0; text-align:center; font-size:12px; color:var(--fg); border:1px solid var(--faint); border-radius:13px; padding:13px 0; background:transparent; cursor:pointer;} .fa-btns .b:active{background:var(--card2);}
  /* scanner reticle overlay */

  .scan-reticle .chk{position:absolute; opacity:0; color:var(--good); font-size:40px; font-weight:800; text-shadow:0 0 14px rgba(70,201,139,.6);}
  .scan-reticle.hit .chk{animation:bcchk .5s ease forwards;}
  @keyframes bcpop{0%{transform:scale(1)}40%{transform:scale(1.06)}100%{transform:scale(1)}}
  @keyframes bcchk{0%{opacity:0;transform:scale(.4)}55%{opacity:1;transform:scale(1.15)}100%{opacity:1;transform:scale(1)}}
  .bc-check{color:var(--good); font-weight:800; margin-right:5px;}
  /* loading spinner / dots */
  .spin{display:inline-block; width:11px; height:11px; border:1.5px solid var(--o20); border-top-color:var(--fg); border-radius:50%; animation:spin .7s linear infinite; vertical-align:middle; margin-right:6px;}
  @keyframes spin{to{transform:rotate(360deg)}}
  /* day navigator (macros) */

<body>
  <div class="frame" id="app">
    <div class="scroll" id="view"></div>
    <div class="footer" id="wfooter" style="display:none"><button class="abort" data-act="abort">abort</button><button class="save" data-act="save">save session</button></div>
    <nav class="nav" id="nav"></nav>
  </div>

<script>
"use strict";
const LS_KEY='gymtrk_db_v1';
// AI vision proxy (Cloudflare Worker holding the owner's Gemini key). Empty => fall back to on-device OCR.
// After deploying proxy/gymtrk-ai-worker.js, paste its URL here, e.g. 'https://gymtrk-ai.tucuenta.workers.dev'.
const AI_PROXY_URL='';
const pad=n=>String(n).padStart(2,'0');
const MON=['ene','feb','mar','abr','may','jun','jul','ago','sep','oct','nov','dic'];
function todayISO(d){d=d||new Date();return d.getFullYear()+'-'+pad(d.getMonth()+1)+'-'+pad(d.getDate());}
function fmtDate(iso){const[y,m,dd]=iso.split('-');return dd+' '+MON[(+m)-1]+' '+y;}
function fmtShort(iso){const[y,m,dd]=iso.split('-');return dd+' '+MON[(+m)-1];}
function nowHM(){const d=new Date();return pad(d.getHours())+':'+pad(d.getMinutes());}
function uid(){return 'x'+Math.floor(performance.now()*1000).toString(36)+Math.floor(performance.now()%1*1e6).toString(36);}
let _c=0; function nid(){return 'n'+(Date.now? '' : '')+(_c++).toString(36)+Math.floor(performance.now()).toString(36);}

// ---------- seed ----------
function seed(){
  const mk=(name,muscle,o={})=>Object.assign({name,muscle,type:'free',machine:'',unilateral:false,sets:2},o);
  return {
    version:1,
    profile:{username:''},
    settings:{unit:'lbs',goals:{kcal:2200,protein:165,carbs:240,fat:65,sodium:2300,potassium:3500,sugar:50,fiber:30,water:3.0,caffeine:400}},
    activeGym:'',
    gyms:[],
    machines:{},
    rotIdx:0,
    split:{name:'push/pull A/B', days:[
      {id:'d1',name:'chest/push A',tag:'@ RIR · F',metric:'rir',allowFailure:true,exercises:[
        mk('cable pushdown','tricep',{type:'machine',machine:'cable',sets:2}),
        mk('bb incline','chest',{machine:'barbell',sets:2}),
        mk('flat press','chest',{sets:1}),
        mk('pec fly','chest',{type:'machine',machine:'pulley',sets:1}),
        mk('shoulder press','delts',{machine:'dumbbell',sets:2}),
        mk('calf extension','calfs',{type:'machine',sets:2}),
        mk('leg ext + pad','quads',{type:'machine',sets:2}),
        mk('laying neck curl','neck',{sets:2})
      ]},
      {id:'d2',name:'back/pull A',tag:'@ RIR · F',metric:'rir',allowFailure:true,exercises:[
        mk('lat pulldown','back',{type:'machine',machine:'pulley',sets:2}),
        mk('bb row','back',{machine:'barbell',sets:2}),
        mk('rear delt fly','delts',{type:'machine',sets:1}),
        mk('bb curl','biceps',{machine:'barbell',sets:2})
      ]},
      {id:'d3',name:'legs A',tag:'@ RIR · F',metric:'rir',allowFailure:true,exercises:[
        mk('squat','quads',{machine:'barbell',sets:3}),
        mk('rdl','hams',{machine:'barbell',sets:2}),
        mk('leg press','quads',{type:'machine',sets:2})
      ]},
      {id:'d4',name:'chest/push B',tag:'@ RIR · F',metric:'rir',allowFailure:true,exercises:[
        mk('ohp','delts',{machine:'barbell',sets:2}),
        mk('incline db press','chest',{machine:'dumbbell',sets:2}),
        mk('lateral raise','delts',{unilateral:true,sets:2})
      ]},
      {id:'d5',name:'back/pull B',tag:'@ RIR · F',metric:'rir',allowFailure:true,exercises:[
        mk('pullups','back',{sets:3}),
        mk('chest supported row','back',{type:'machine',sets:2}),
        mk('hammer curl','biceps',{unilateral:true,sets:2})
      ]},
      {id:'d6',name:'legs B',tag:'@ RIR · F',metric:'rir',allowFailure:true,exercises:[
        mk('hack squat','quads',{type:'machine',sets:3}),
        mk('leg curl','hams',{type:'machine',sets:2}),
        mk('calf raise','calfs',{type:'machine',sets:3})
      ]}
    ]},
    sessions:[],
    meals:{},
    foods:[]
  };
}
function seedPrev(){
  const d=new Date(); d.setDate(d.getDate()-3);
  const S=(w,r,rir,unit,side)=>({w:String(w),r:String(r),rir:String(rir),unit:unit||'lbs',side:side||null,fsOn:false,extraW:'',isDrop:false,done:true});
  return {id:uid(),date:todayISO(d),dayId:'d1',dayName:'chest/push A',gym:'PRO GYM — arandas',durSec:3840,exercises:[
    {name:'cable pushdown',muscle:'tricep',sets:[S(57,7,'F','kg'),S(57,6,'F','kg')]},
    {name:'bb incline',muscle:'chest',sets:[S(115,7,9),S(115,8,9)]},
    {name:'flat press',muscle:'chest',sets:[S(100,7,9)]},
    {name:'pec fly',muscle:'chest',sets:[S(130,9,'F')]},
    {name:'shoulder press',muscle:'delts',sets:[S(55,8,9,'lbs','R'),S(55,8,9,'lbs','L'),S(50,6,'F','lbs','R'),S(50,6,'F','lbs','L')]},
    {name:'calf extension',muscle:'calfs',sets:[S(140,12,9),S(125,10,9)]},
    {name:'leg ext + pad',muscle:'quads',sets:[S(160,12,7),S(160,10,8)]},
    {name:'laying neck curl',muscle:'neck',sets:[]}
  ]};
}

// ---------- persistence ----------
let db;
function load(){ try{const r=localStorage.getItem(LS_KEY); if(!r)return seed(); const d=JSON.parse(r); return migrate(d);}catch(e){console.warn('load failed',e);return seed();} }
function migrate(d){ if(!d.version){d.version=1;} if(!d.meals)d.meals={}; if(!d.foods)d.foods=[]; d.foods=d.foods.map(f=>(f&&f.per100)?f:asCanonical(f)); if(!d.steps)d.steps={}; if(!d.machines)d.machines={}; if(!d.bodyweight)d.bodyweight={}; if(!d.mealTags)d.mealTags=['breakfast','lunch','snack','dinner']; if(!d.settings)d.settings={goals:seed().settings.goals}; return d; }
function save(){ try{localStorage.setItem(LS_KEY,JSON.stringify(db));}catch(e){console.warn('save failed',e);} }

// ---------- helpers ----------
const dayCount=()=>db.split.days.length;
const curDayIdx=()=>db.rotIdx % dayCount();
const curDay=()=>db.split.days[curDayIdx()];
function selIdx(){ return state.selDay==null?curDayIdx():((state.selDay%dayCount())+dayCount())%dayCount(); }
function lastSession(dayId){ const s=db.sessions.filter(x=>x.dayId===dayId&&x.type!=='rest').sort((a,b)=>b.date<a.date?-1:1); return s[0]||null; }
function setsList(ex){ return ex.sets||[]; }
function emptySet(ex,side,isDrop){ return {w:'',r:'',rir:'',unit:(ex&&ex.unit)||db.settings.unit||'lbs',side:side||null,fsOn:!!(ex&&ex.useFS),extraW:'',isDrop:!!isDrop,done:false}; }
function newWorkSession(){
  const day=db.split.days[selIdx()];
  const exs=day.exercises.map(e=>{
    const sets=[]; const n=e.sets||1;
    for(let i=0;i<n;i++){ if(e.unilateral){sets.push(emptySet(e,'R'));sets.push(emptySet(e,'L'));} else sets.push(emptySet(e)); }
    return {name:e.name,muscle:e.muscle,type:e.type,machine:e.machine,unilateral:e.unilateral,note:e.note||'',sets};
  });
  return {id:uid(),date:todayISO(),dayId:day.id,dayName:day.name,gym:db.activeGym,startTs:nowHM(),startMs:Date.now(),loggedAfter:false,exercises:exs};
}
// ---- per-gym machine/brand/setup linking ----
function escTxt(s){ return (s||'').replace(/[<&]/g,c=>c==='<'?'&lt;':'&amp;'); }
function exKey(ex){ return ((ex&&ex.name)||'').toLowerCase().trim(); }
// resolved record {brand,setup,na} for an exercise at a given gym (falls back to split default)
function machineRec(gym,ex){
  const m=gym&&db.machines&&db.machines[gym]; const k=exKey(ex);
  if(m&&Object.prototype.hasOwnProperty.call(m,k)){ const r=m[k];
    if(typeof r==='string') return {brand:r,setup:'',na:false};
    return {brand:r.brand||'',setup:r.setup||'',na:!!r.na}; }
  return {brand:(ex&&ex.machine)||'',setup:'',na:false};
}
function setMachine(gym,ex,rec){ if(!gym)return; db.machines=db.machines||{}; db.machines[gym]=db.machines[gym]||{};
  db.machines[gym][exKey(ex)]={brand:(rec.brand||'').trim(),setup:(rec.setup||'').trim(),na:!!rec.na}; save(); }

// stats
function stat7(){
  const now=new Date(); const cutoff=new Date(now); cutoff.setDate(now.getDate()-7); const c=todayISO(cutoff);
  let vol=0,count=0; const dates=new Set();
  db.sessions.forEach(s=>{ if(s.type==='rest')return; if(s.date>=c){count++; dates.add(s.date);} (s.exercises||[]).forEach(e=>(e.sets||[]).forEach(st=>{const w=parseFloat(st.w)||0,r=parseFloat(st.r)||0; if(s.date>=c)vol+=w*r;}));});
  return {vol,count};
}
function streak(){ const ds=[...new Set(db.sessions.filter(s=>s.type!=='rest').map(s=>s.date))].sort().reverse(); if(!ds.length)return 0; let st=0; let d=new Date(); for(;;){const iso=todayISO(d); if(ds.includes(iso)){st++;d.setDate(d.getDate()-1);} else {if(iso===todayISO())d.setDate(d.getDate()-1); else break;}} return st; }
// weekly hard sets per muscle (RIR<=4 = hard) over last N days, with RP landmarks
const VOL_LANDMARKS={chest:[10,20,22],back:[10,22,25],quads:[8,18,20],hams:[6,16,20],delts:[8,22,26],biceps:[8,20,26],tricep:[6,14,18],triceps:[6,14,18],calfs:[8,16,20],calves:[8,16,20],abs:[6,25,25],traps:[4,20,26],glutes:[4,16,16],neck:[4,12,16]};
function isHardSet(st){ const r=st.rir; if(r===''||r==null)return true; if(r==='F')return true; const n=parseFloat(r); return isNaN(n)?true:n<=4; }
function weeklySets(days){ days=days||7; const now=new Date(); const cut=new Date(now); cut.setDate(now.getDate()-days); const c=todayISO(cut);
  const byM={}; const freq={};
  db.sessions.forEach(s=>{ if(s.type==='rest'||s.date<c)return; const seen={};
    (s.exercises||[]).forEach(e=>{ const m=(e.muscle||'other').toLowerCase(); let hard=0; (e.sets||[]).forEach(st=>{ if((st.w||st.r)&&isHardSet(st))hard++; });
      if(hard>0){ byM[m]=(byM[m]||0)+hard; seen[m]=1; } });
    Object.keys(seen).forEach(m=>{ freq[m]=(freq[m]||0)+1; });
  });
  return {byM,freq};
}
function volStatus(m,sets){ const L=VOL_LANDMARKS[m]; if(!L)return ''; if(sets<L[0])return 'under'; if(sets<=L[1])return 'optimal'; if(sets<=L[2])return 'high'; return 'over'; }
function e1rmTrend(){ // best Epley e1RM per exercise, this week vs prior week
  const wk=(off)=>{ const now=new Date(); const a=new Date(now); a.setDate(now.getDate()-7*off-7); const b=new Date(now); b.setDate(now.getDate()-7*off); const ai=todayISO(a),bi=todayISO(b); const best={};
    db.sessions.forEach(s=>{ if(s.type==='rest'||s.date<ai||s.date>=bi)return; (s.exercises||[]).forEach(e=>{ (e.sets||[]).forEach(st=>{ const w=parseFloat(st.w)||0,r=parseFloat(st.r)||0; if(w&&r){ const e1=w*(1+r/30); if(!best[e.name]||e1>best[e.name])best[e.name]=e1; } }); }); }); return best; };
  const cur=wk(0),prev=wk(1); const out=[];
  Object.keys(cur).forEach(k=>{ out.push({name:k,cur:cur[k],prev:prev[k]||null}); });
  return out.sort((a,b)=>b.cur-a.cur).slice(0,3);
}
function topLift(){ const m={}; db.sessions.forEach(s=>{if(s.type==='rest')return;(s.exercises||[]).forEach(e=>{let v=0;(e.sets||[]).forEach(st=>v+=(parseFloat(st.w)||0)*(parseFloat(st.r)||0)); m[e.name]=(m[e.name]||0)+v;});}); let best='—',bv=-1; for(const k in m){if(m[k]>bv){bv=m[k];best=k;}} return best; }
function kfmt(n){ return n>=1000? (n/1000).toFixed(1)+'k' : String(Math.round(n)); }
function elapsedStr(ms){ if(!ms)return''; const s=Math.max(0,Math.round((Date.now()-ms)/1000)); const h=Math.floor(s/3600),m=Math.floor(s%3600/60); return h?h+'h '+pad(m)+'m':m+'m'; }

// ---------- render: nav ----------
function renderNav(){
  const n=document.getElementById('nav'); const sc=state.screen;
  if(sc==='workout'||sc==='settings'||sc==='splitedit'||sc==='history'||sc==='share'||!db.profile.username){ n.style.display='none'; return; } n.style.display='flex';
  const tab=(id,lbl)=>`<a data-act="nav" data-screen="${id}" class="${sc===id?'active':''}">${lbl}</a>`;
  n.innerHTML=tab('progress','progress')+tab('home','gym')+tab('macros','macros');
}

// ---------- render: home ----------
function statusBar(back){
  const d=new Date();
  return `<div class="status"><div class="left"><div class="uname" data-act="profile" style="cursor:pointer">u/${db.profile.username}</div>${back?'<span class="back" data-act="leave">← back</span>':''}</div>`
    +`<div class="center">${fmtDate(todayISO())}<br/>${nowHM()}</div>`
    +`<div class="streak">streak: <b>${streak()}</b></div></div>`;
}
function renderHome(){
  const di=selIdx(); const day=db.split.days[di]; const prev=lastSession(day.id); const s7=stat7(); const inprog=db.activeWork;
  const segs=db.split.days.map((_,i)=>`<i class="seg ${i===di?'on':''}" data-act="selday" data-i="${i}"></i>`).join('');
  let prevHTML='';
  if(prev){
    const exItems=prev.exercises.filter(e=>(e.sets||[]).length);
    const exHtml=exItems.map(e=>{
      const sets=e.sets.map(s=>{
        const w=s.w?(numTxt(s.w)+(s.unit||'')):'—';
        const reps=(s.r!==''&&s.r!=null)?s.r:'—';
        const rir=(s.rir!==''&&s.rir!=null)?(' <span class="pr">@'+s.rir+'</span>'):'';
        const mk=s.isDrop?'<span class="pk">↓</span> ':(s.fsOn?'<span class="pk">FS</span> ':'');
        const side=s.side?('<span class="pk">'+s.side+'</span> '):'';
        return `${mk}${side}${w}×${reps}${rir}`;
      }).join('<span class="pdot"> · </span>');
      return `<div class="psd"><div class="pex">${escTxt(e.name)}${e.machine?` <span class="pm">${escTxt(e.machine)}</span>`:''}</div><div class="psets">${sets}</div></div>`;
    }).join('');
    let vol=0; prev.exercises.forEach(e=>(e.sets||[]).forEach(s=>vol+=(parseFloat(s.w)||0)*(parseFloat(s.r)||0)));
    const dur=prev.durSec?Math.floor(prev.durSec/3600)+'h '+pad(Math.floor(prev.durSec%3600/60))+'m':'';
    prevHTML=`<hr class="rule"/><div class="whdr"><div class="l1"><span class="s">//</span>PREV</div><div class="wname">${prev.dayName}</div><div class="l2">SESSION</div><div class="wmeta">${fmtShort(prev.date)} · ${exItems.length} exercises</div></div>`
      +`<div class="prevsess">${exHtml}</div>`
      +`<div class="rowend"><span>${kfmt(vol)} lb${dur?' · '+dur:''}</span></div>`;
  }
  return statusBar(false)
    +`<hr class="rule"/>`
    +`<div class="rot"><span class="lbl">ROTATION</span><span class="n"><span class="arrow" data-act="prevday">‹</span> day ${di+1}/${dayCount()} <span class="arrow" data-act="nextday">›</span></span></div>`
    +`<div class="segs">${segs}</div>`

function dayLabel(iso){ if(iso===todayISO())return 'HOY'; const d=new Date(iso+'T12:00:00'); const wd=['dom','lun','mar','mié','jue','vie','sáb'][d.getDay()]; return wd+' '+fmtShort(iso); }
function macroTotals(){
  const today=curDate(); const items=db.meals[today]||[]; const t={kcal:0,protein:0,carbs:0,fat:0,sodium:0,potassium:0,sugar:0,fiber:0,water:0,caffeine:0};
  items.forEach(m=>{ for(const k in t){ t[k]+=parseFloat(m[k])||0; } }); return {items,t};
}
function bloating(t,g){
  // Subcutaneous (extracellular) water-retention tendency — acute, day-level heuristic.
  // Evidence-weighted: Na:K balance dominates (validated retention marker; K drives natriuresis),
  // plus acute Na load, hydration status (low intake -> RAAS/ADH retention) and sugar/insulin-driven
  // renal Na reabsorption. Carbs/glycogen water excluded on purpose (that's muscle fullness, not skin puffiness).
  const c=x=>Math.max(0,Math.min(1,x));
  const naK=t.sodium/Math.max(t.potassium,1);                  // Na:K mass ratio
  const naKterm=c((naK-0.5)/1.5);                              // ~0.5 balanced (WHO 2000/3500), >=2.0 high
  const naAbs=c(((t.sodium/(g.sodium||2300))-0.8)/0.7);        // big acute sodium load
  const hyd=c(1-t.water/(g.water||3));                         // under-drinking -> retention
  const sugar=c((t.sugar/(g.sugar||50))-1);                    // sugar/insulin -> acute Na reabsorption
  let sc=45*naKterm + 15*naAbs + 25*hyd + 15*sugar;
  sc=Math.max(0,Math.min(100,Math.round(sc)));
  return {sc,label:sc<34?'low':sc<67?'mod':'high'};
}
function macroStatus(val,goal){ if(!goal)return ''; const r=val/goal; if(r>1.05)return 'over'; if(r>=0.9)return 'good'; return ''; }
function renderMacros(){

// monochrome mini bar chart (last bar = bright "now"); opt.norm = min-max scale (for bodyweight)
function miniBars(vals,labels,opt){ opt=opt||{}; const nums=(vals||[]).map(v=>+v||0); if(!nums.length)return '';
  let lo=opt.norm?Math.min(...nums):0, hi=Math.max(...nums); if(hi<=lo)hi=lo+1; const h=opt.h||44;
  return `<div style="display:flex;gap:4px;align-items:flex-end;margin:8px 0 2px;height:${h+11}px">`+nums.map((v,i)=>{
    const ph=Math.round(((v-lo)/(hi-lo))*92)+(v>0||opt.norm?6:0); const cur=i===nums.length-1;
    return `<div style="flex:1;display:flex;flex-direction:column;justify-content:flex-end;align-items:center;height:100%"><div title="${v}" style="width:78%;height:${Math.max(ph,2)}%;background:${cur?'var(--fill)':'var(--o30)'}"></div><span style="font-size:7px;color:var(--o40);margin-top:3px;height:8px;line-height:1">${(labels&&labels[i])||''}</span></div>`;
  }).join('')+`</div>`; }
// single-dot line chart (Rimu-style: thin line + dots + soft gradient fill); opt.zero baselines at 0
function lineChart(vals,opt){ opt=opt||{}; const nums=(vals||[]).map(v=>+v||0); if(!nums.length)return '';
  const W=300,H=opt.h||56,pad=7; let lo=Math.min(...nums),hi=Math.max(...nums); if(opt.zero)lo=Math.min(0,lo); if(hi<=lo)hi=lo+1;
  const n=nums.length, X=i=>n>1?pad+i*(W-2*pad)/(n-1):W/2, Y=v=>+(H-pad-((v-lo)/(hi-lo))*(H-2*pad)).toFixed(1);
  const pts=nums.map((v,i)=>X(i).toFixed(1)+','+Y(v));
  const dots=nums.map((v,i)=>`<circle cx="${X(i).toFixed(1)}" cy="${Y(v)}" r="${i===n-1?2.8:1.7}" fill="${i===n-1?'var(--fill)':'var(--o40)'}"/>`).join('');
  return `<svg viewBox="0 0 ${W} ${H}" preserveAspectRatio="none" style="width:100%;height:${H}px;display:block;margin:10px 0 2px"><defs><linearGradient id="lcg" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="var(--fill)" stop-opacity=".16"/><stop offset="1" stop-color="var(--fill)" stop-opacity="0"/></linearGradient></defs><polygon points="${pad},${H-pad} ${pts.join(' ')} ${W-pad},${H-pad}" fill="url(#lcg)"/><polyline points="${pts.join(' ')}" fill="none" stroke="var(--o60)" stroke-width="1.4" stroke-linejoin="round" stroke-linecap="round"/>${dots}</svg>`; }
function progWeekly(n){ const now=new Date(); const buckets=[]; for(let i=n-1;i>=0;i--){ const a=new Date(now); a.setDate(now.getDate()-7*i-6); const b=new Date(now); b.setDate(now.getDate()-7*i); buckets.push({a:todayISO(a),b:todayISO(b)}); }
  const counts=buckets.map(()=>0), vols=buckets.map(()=>0);
  (db.sessions||[]).forEach(s=>{ if(s.type==='rest')return; for(let i=0;i<buckets.length;i++){ if(s.date>=buckets[i].a&&s.date<=buckets[i].b){ counts[i]++; (s.exercises||[]).forEach(e=>(e.sets||[]).forEach(st=>{vols[i]+=(parseFloat(st.w)||0)*(parseFloat(st.r)||0);})); break; } } });
  return {counts,vols}; }
function avgKcal7(){ const now=new Date(); let sum=0,days=0; for(let i=0;i<7;i++){ const d=new Date(now); d.setDate(now.getDate()-i); const arr=db.meals[todayISO(d)]; if(arr&&arr.length){ days++; sum+=arr.reduce((a,m)=>a+(+m.kcal||0),0); } } return days?Math.round(sum/days):0; }
function openWeightLog(){ const ks=Object.keys(db.bodyweight||{}).sort(); const last=ks.length?db.bodyweight[ks[ks.length-1]]:(db.profile.weightKg||'');
  openModal(`<h3>peso corporal</h3>
   <div class="field"><label>PESO (kg)</label><input id="bw_kg" type="number" inputmode="decimal" value="${last||''}" placeholder="ej. 72.5"/></div>
   <div class="submeta" style="margin-bottom:10px">se guarda con la fecha de hoy</div>

  document.getElementById('bw_save').onclick=()=>{ const v=parseFloat(val('bw_kg')); if(!v||v<=0){ alert('Pon un peso válido.'); return; } db.bodyweight=db.bodyweight||{}; db.bodyweight[todayISO()]=v; db.profile.weightKg=v; save(); closeModal(); render(); };
}
function renderProgress(){
  const totalSessions=(db.sessions||[]).filter(s=>s.type!=='rest').length;
  const bwKeys=Object.keys(db.bodyweight||{}).sort(); const bwVals=bwKeys.map(k=>db.bodyweight[k]);
  const curBw=bwVals.length?bwVals[bwVals.length-1]:(db.profile.weightKg||0);
  let out=statusBar(false)+`<hr class="rule"/><div class="section"><div class="h"><span class="s">//</span>PROGRESS</div><div class="meta">${totalSessions} sesiones</div></div>`;
  if(!totalSessions && !bwVals.length){
    return out+`<div class="empty">aún no hay datos<br/>entrena o registra tu peso para ver progreso</div>`
      +`<button class="start" data-act="logweight" style="margin-top:14px">＋ registrar peso corporal</button>`;
  }
  const w=progWeekly(8); const str=streak(); const s7=stat7(); const e1=e1rmTrend();
  // consistency
  out+=`<div class="grp-label">CONSISTENCIA</div>`
    +`<div class="line"><span class="k">racha</span><span class="dots"></span><span class="v">${str} día${str===1?'':'s'}</span></div>`
    +`<div class="line"><span class="k">esta semana</span><span class="dots"></span><span class="v">${s7.count} sesiones</span></div>`
    +`<div class="submeta">sesiones / semana · últimas 8</div>`
    +lineChart(w.counts,{zero:true});
  // volume
  out+=`<hr class="rule"/><div class="grp-label">VOLUMEN · Σ peso×reps / semana</div>`
    +lineChart(w.vols,{zero:true})
    +`<div class="submeta">esta semana: ${Math.round(w.vols[w.vols.length-1]).toLocaleString()}</div>`;
  // strength e1RM
  if(e1.length){ out+=`<hr class="rule"/><div class="grp-label">FUERZA · e1RM Epley (vs semana previa)</div>`;
    e1.forEach(x=>{ const d=x.prev!=null?Math.round(x.cur-x.prev):null; const arr=d==null?'·':(d>0?'▲':d<0?'▼':'='); const col=d>0?'var(--fill)':d<0?'#c8553d':'var(--o40)';
      out+=`<div class="line"><span class="k">${escTxt(x.name)}</span><span class="dots"></span><span class="v">${Math.round(x.cur)} <span style="color:${col};font-size:9px">${arr}${d?Math.abs(d):''}</span></span></div>`; }); }
  // bodyweight
  out+=`<hr class="rule"/><div class="section" style="margin-bottom:6px"><div class="grp-label" style="margin-bottom:0">PESO CORPORAL</div><a class="meta" data-act="logweight">[+ log]</a></div>`;
  if(bwVals.length>=2){ const ch=Math.round((bwVals[bwVals.length-1]-bwVals[0])*10)/10;
    out+=lineChart(bwVals.slice(-12))
      +`<div class="line"><span class="k">actual</span><span class="dots"></span><span class="v">${curBw} kg</span></div>`
      +`<div class="submeta">${ch>=0?'+':''}${ch} kg desde el 1er registro · ${bwVals.length} registros</div>`;
  } else { out+=`<div class="line"><span class="k">actual</span><span class="dots"></span><span class="v">${curBw?curBw+' kg':'—'}</span></div><div class="submeta">registra tu peso varios días para ver la tendencia</div>`; }
  // nutrition
  out+=`<hr class="rule"/><div class="grp-label">NUTRICIÓN · promedio 7 días</div>`
    +`<div class="line"><span class="k">kcal / día</span><span class="dots"></span><span class="v">${avgKcal7()||'—'} <span style="color:var(--o40);font-size:9px">/ ${db.settings.goals.kcal}</span></span></div>`;
  return out;
}

let state={screen:'home',work:null,macroOpen:false};
function render(){
  const v=document.getElementById('view');
  let sc=state.screen;
  if(!db.profile.username){ sc = (state.screen==='onboard'||state.screen==='login') ? state.screen : 'landing'; }
  if(sc==='workout'){ state.work=db.activeWork; if(!state.work){ state.screen=sc='home'; } }
  v.innerHTML = sc==='landing'?renderLanding() : sc==='login'?renderLogin() : sc==='onboard'?renderOnboard() : sc==='home'?renderHome() : sc==='workout'?renderWorkout() : sc==='macros'?renderMacros() : sc==='share'?renderShare() : sc==='progress'?renderProgress() : sc==='settings'?renderSettings() : sc==='splitedit'?renderSplitEdit() : sc==='history'?renderHistory() : renderHome();
  document.getElementById('wfooter').style.display = sc==='workout'?'flex':'none';

}

function setField(exi,si,f,val){ const w=db.activeWork; if(!w)return; w.exercises[exi].sets[si][f]=val; save(); }
document.getElementById('app').addEventListener('click',e=>{
  const el=e.target.closest('[data-act]'); if(!el)return; const a=el.dataset.act;
  const exi=el.dataset.exi!=null?+el.dataset.exi:null, si=el.dataset.si!=null?+el.dataset.si:null;
  if(a==='nav'){ go(el.dataset.screen); }
  else if(a==='start'){ db.activeWork=newWorkSession(); save(); go('workout'); }
  else if(a==='loglater'){ const w=newWorkSession(); w.loggedAfter=true; w.startMs=null; const y=new Date(); y.setDate(y.getDate()-1); w.date=todayISO(y); db.activeWork=w; save(); go('workout'); }
  else if(a==='togglenoadv'){ if(db.activeWork){ db.activeWork.noAdvance=!db.activeWork.noAdvance; render(); } }
  else if(a==='resume'){ go('workout'); }
  else if(a==='leave'){ go('home'); }
  else if(a==='abort'){ if(confirm('Abort workout? Lo registrado se descarta.')){ db.activeWork=null; save(); go('home'); } }
  else if(a==='selday'){ state.selDay=+el.dataset.i; render(); }
  else if(a==='prevday'){ state.selDay=selIdx()-1; render(); }
  else if(a==='nextday'){ state.selDay=selIdx()+1; render(); }
  else if(a==='rest'){ db.sessions.push({id:uid(),date:todayISO(),type:'rest',dayId:curDay().id}); db.rotIdx++; state.selDay=null; save(); go('home'); }
  else if(a==='skip'){ db.rotIdx++; state.selDay=null; save(); go('home'); }
  else if(a==='changegym'){ openGymPicker(); }
  else if(a==='pickgym'){ db.activeGym=el.dataset.g; if(db.activeWork)db.activeWork.gym=el.dataset.g; save(); closeModal(); render(); }
  else if(a==='lcreate'){ state.screen='onboard'; render(); }
  else if(a==='llogin'){ state.screen='login'; render(); }
  else if(a==='backlanding'){ state.screen='landing'; render(); }
  else if(a==='loginfile'){ doImport(); }
  else if(a==='dologin'){ try{ const d=JSON.parse(val('li_txt')); if(!d.split||!d.profile||!d.profile.username) throw 0; db=migrate(d); save(); state.screen='home'; render(); }catch(e){ const m=document.getElementById('li_msg'); if(m)m.textContent='texto inválido · revisa que sea el backup completo'; } }

function importIronlogSplit(d){
  if(!d||!Array.isArray(d.days)) throw new Error('formato inválido (falta days[])');
  const days=d.days.map((dy,i)=>({
    id: dy.id||('d'+i+uid()),
    name:(dy.name||('día '+(i+1))).trim(),
    tag:'@ '+(dy.metric||'RIR')+(dy.allowFailure!==false?' · F':''),
    focus:dy.focus||'', metric:(dy.metric||'rir').toLowerCase(), allowFailure:dy.allowFailure!==false,
    exercises:(dy.exercises||[]).map(e=>({
      name:(e.name||'').trim(),
      muscle:(e.muscleTag||e.muscle||'other').replace(/^#/,'').toLowerCase(),
      type:e.type==='machine'?'machine':'free',
      machine:e.machine||'', unilateral:!!e.unilateral,
      sets:Math.max(1,+e.sets||1), unit:e.unit||'', useFS:!!e.useFS, note:e.note||''
    }))
  }));
  return {name:(d.name||'imported split').trim(), days};
}

function servingToGrams(str){ if(!str)return 0; const m=(''+str).toLowerCase().match(/(\d+(?:[.,]\d+)?)\s*(kg|g|gr|grs|gramos?|ml|cl|dl|l)\b/); if(!m)return 0; let v=parseFloat(m[1].replace(',','.'))||0; const u=m[2]; if(u==='kg'||u==='l')v*=1000; else if(u==='dl')v*=100; else if(u==='cl')v*=10; return v; }

// upgrade any food (canonical or legacy {per,serving,isLiquid}) to canonical shape
function asCanonical(food){ food=food||{};
  if(food.per100){ const per100=Object.assign({},foodPer(),food.per100); delete per100.water;
    return {id:food.id,barcode:food.barcode||'',name:food.name||'',brand:food.brand||'',base:food.base||'g',per100,sizes:food.sizes||{},servingLabel:food.servingLabel||'',gramsUnknown:!!food.gramsUnknown}; }
  const base=food.isLiquid?'ml':'g'; const per=Object.assign({},foodPer(),food.per||{}); const sv=food.serving||''; const g=servingToGrams(sv);
  const per100=foodPer(); delete per100.water; const sizes={}; let gramsUnknown=false, servingLabel='';
  if(g>0){ const f=100/g; MACROKEYS.forEach(k=>per100[k]=Math.round((per[k]||0)*f*100)/100); if(g!==100)sizes.serving=g; }
  else { MACROKEYS.forEach(k=>per100[k]=per[k]||0); sizes.serving=100; gramsUnknown=true; servingLabel=sv||'porción'; }
  return {id:food.id,barcode:food.barcode||'',name:food.name||'',brand:food.brand||'',base,per100,sizes,servingLabel,gramsUnknown}; }
function unitGrams(food,key){ const s=(food&&food.sizes)||{}; if(key==='g'||key==='ml')return 1; if(key==='100')return 100; if(key==='serving')return s.serving||0; if(key==='piece')return s.piece||0; if(key==='container')return s.container||0; return 0; }
function foodUnits(food){ const base=(food&&food.base)||'g'; const s=(food&&food.sizes)||{};
  if(food&&food.gramsUnknown){ return [{key:'serving',label:food.servingLabel||'porción',grams:s.serving||100}]; }
  const u=[]; if(s.serving)u.push({key:'serving',label:(food.servingLabel||'porción')+' ('+numTxt(s.serving)+' '+base+')',grams:s.serving});
  if(s.piece)u.push({key:'piece',label:'pieza ('+numTxt(s.piece)+' '+base+')',grams:s.piece});
  if(s.container)u.push({key:'container',label:'envase ('+numTxt(s.container)+' '+base+')',grams:s.container});
  u.push({key:'100',label:'100 '+base,grams:100}); u.push({key:base,label:base,grams:1}); return u; }
function computeNutrients(food,key,qty){ const grams=(qty||0)*unitGrams(food,key); const f=grams/100; const p=food.per100||{}; const out={};
  MACROKEYS.forEach(k=>out[k]=Math.round(((p[k]||0)*f)*100)/100); out.water=(food.base==='ml')?Math.round((grams/1000)*1000)/1000:0; out._grams=grams; return out; }
// convert an AI/label extraction (basis + printed values + sizes) into a canonical food
function normalizeExtract(d){ d=d||{}; const svStr=d.serving||d.serving_label||'';
  const base=d.base||((d.basis==='100ml')||/\b(ml|l|cl|dl)\b/i.test(svStr)?'ml':'g');
  let basisGrams=0;
  if(d.basis==='100g'||d.basis==='100ml')basisGrams=100;
  else if(d.basis==='serving')basisGrams=d.serving_g||servingToGrams(svStr)||0;
  else if(d.basis==='package'||d.basis==='container')basisGrams=d.container_g||0;
  const vals=d.values||d.per||{}; const per100=foodPer(); delete per100.water; let gramsUnknown=false;
  if(basisGrams>0){ const f=100/basisGrams; MACROKEYS.forEach(k=>per100[k]=Math.round((vals[k]||0)*f*100)/100); }
  else { MACROKEYS.forEach(k=>per100[k]=+vals[k]||0); gramsUnknown=true; }
  const sizes={}; const sg=d.serving_g||servingToGrams(svStr);
  if(sg>0&&sg!==100)sizes.serving=sg;

  if(d.container_g)sizes.container=d.container_g; else if(sg&&d.servings_per_container)sizes.container=Math.round(sg*d.servings_per_container*100)/100;
  return {name:d.name||'',brand:d.brand||'',barcode:d.barcode||'',base,per100,sizes,servingLabel:(gramsUnknown?svStr:(d.serving_label||'')),gramsUnknown}; }

async function decodeImgSrc(url){

  for(const cb of [['medium',1600],['large',1600],['x-large',1920],['medium',1024],['large',800]]){ code=await one(cb[0],cb[1]); if(code)break; }
  return code;
}

function servingToLiters(sz){
  if(!sz)return 0;
  const m=(sz+'').toLowerCase().match(/(\d+(?:[.,]\d+)?)\s*(ml|cl|dl|l\b|litre|liter)/);
  if(!m)return 0;
  const v=parseFloat(m[1].replace(',','.'));
  if(m[2]==='ml')return v/1000;
  if(m[2]==='cl')return v/100;
  if(m[2]==='dl')return v/10;
  return v; // l / litre / liter
}
function mapProduct(p){
  const n=p.nutriments||{};
  const svStr=(p.serving_size||'').trim();
  // Detect liquid from serving label or product name
  const isLiquid=/\d+\s*(ml|cl|dl|fl)/i.test(svStr) || /\bl\b/i.test(svStr) ||
                 /beverage|drink|juice|milk|leche|bebida|jugo|agua/i.test((p.product_name||'')+(p.categories||''));
  // For liquids: always per 100ml (unambiguous, no inconsistency).
  // For solids: use _serving if declared (natural unit like "1 galleta 28g"); fall back to 100g.
  const base=isLiquid?'ml':'g';
  const g=b=> (+n[b+'_100g']||0);   // OpenFoodFacts always gives per-100 g/ml → our canonical base
  const per100={ kcal:+n['energy-kcal_100g']||0, protein:g('proteins'), carbs:g('carbohydrates'), fat:g('fat'),
    sugar:g('sugars'), fiber:g('fiber'), sodium:Math.round(g('sodium')*1000), potassium:Math.round(g('potassium')*1000), caffeine:g('caffeine') };
  const sizes={}; const sg=servingToGrams(svStr); if(sg>0&&sg!==100)sizes.serving=sg;
  return { barcode:p.code||'', name:p.product_name||'', brand:p.brands||'', base, per100, sizes, servingLabel:'' };
}

function parseNutritionText(txt){
  const per=foodPer();
  // normalize: lowercase + comma-decimal (5,2 -> 5.2) so LatAm labels parse
  const s=(txt||'').toLowerCase().replace(/(\d)[,](\d)/g,'$1.$2');
  const NUM='(\\d+(?:\\.\\d+)?)';
  // first number appearing shortly (≤15 non-digits, incl. newlines) after a label
  const after=labels=>{ const m=s.match(new RegExp('(?:'+labels+')\\D{0,15}?'+NUM,'i')); return m?parseFloat(m[1]):0; };
  // same but also capture the unit, for g<->mg disambiguation
  const afterU=labels=>{ const m=s.match(new RegExp('(?:'+labels+')\\D{0,15}?'+NUM+'\\s*(mcg|µg|mg|kcal|kj|g)?','i')); return m?{v:parseFloat(m[1])||0,u:(m[2]||'').toLowerCase()}:{v:0,u:''}; };
  // kcal: prefer an explicit "NNN kcal" token so we never grab the kJ figure
  const kc=(s.match(new RegExp(NUM+'\\s*kcal','i'))||[])[1];
  per.kcal=kc!=null?parseFloat(kc):after('calor[ií]as?|calories|energ[ií]a|energy');
  per.protein=after('prote[ií]nas?|protein');

function loadScript(src){ return new Promise((res,rej)=>{ const ex=document.querySelector('script[data-x="'+src+'"]'); if(ex&&ex.dataset.ok){res();return;} if(ex)ex.remove(); const s=document.createElement('script'); s.src=src; s.setAttribute('data-x',src); const to=setTimeout(()=>{ try{s.remove();}catch(_){} rej(new Error('timeout')); },15000); s.onload=()=>{ clearTimeout(to); s.dataset.ok='1'; res(); }; s.onerror=()=>{ clearTimeout(to); try{s.remove();}catch(_){} rej(new Error('load fail')); }; document.head.appendChild(s); }); }
// downscale + grayscale + contrast → much better/faster OCR on phone photos
function prepImage(file){ return new Promise(res=>{
  const img=new Image(); const url=URL.createObjectURL(file);
  img.onload=()=>{ const max=1600; let{width:w,height:h}=img; const sc=Math.min(1,max/Math.max(w,h)); w=Math.round(w*sc); h=Math.round(h*sc);
    const c=document.createElement('canvas'); c.width=w; c.height=h; const cx=c.getContext('2d'); cx.drawImage(img,0,0,w,h);
    try{ const d=cx.getImageData(0,0,w,h),a=d.data; for(let i=0;i<a.length;i+=4){ let g=0.299*a[i]+0.587*a[i+1]+0.114*a[i+2]; g=(g-128)*1.4+128; g=g<0?0:g>255?255:g; a[i]=a[i+1]=a[i+2]=g; } cx.putImageData(d,0,0); }catch(_){}
    URL.revokeObjectURL(url); res(c); };
  img.onerror=()=>{ URL.revokeObjectURL(url); res(file); };
  img.src=url; }); }
async function ocrPhoto(file,barcode){ if(!file)return; window._faTag=window._faTag||curTag();

    const mm=document.getElementById('ocr_msg');

    const {data}=await Tesseract.recognize(src,'eng+spa',{logger:p=>{ if(mm&&p.status==='recognizing text') mm.textContent='leyendo… '+Math.round(p.progress*100)+'%'; }});

function fileToDataURL(file,maxDim,q){ maxDim=maxDim||1280; q=q||0.82; return new Promise(res=>{
  const img=new Image(); const url=URL.createObjectURL(file);
  img.onload=()=>{ let w=img.width,h=img.height; const sc=Math.min(1,maxDim/Math.max(w,h)); w=Math.max(1,Math.round(w*sc)); h=Math.max(1,Math.round(h*sc));
    const c=document.createElement('canvas'); c.width=w; c.height=h; c.getContext('2d').drawImage(img,0,0,w,h);
    URL.revokeObjectURL(url); let out=null; try{ out=c.toDataURL('image/jpeg',q); }catch(_){} res(out); };
  img.onerror=()=>{ URL.revokeObjectURL(url); res(null); };
  img.src=url; }); }
function sanitizePer(o){ const p=foodPer(); if(o&&typeof o==='object'){ for(const k in p){ const v=parseFloat(o[k]); if(!isNaN(v)&&isFinite(v)) p[k]=v<0?0:v; } } return p; }
function labelFallback(msgEl,barcode,reason){ if(!msgEl)return;
  msgEl.innerHTML=(reason||'no se pudo leer la etiqueta')+'<div class="secondary" style="margin-top:10px"><button class="b" id="ai_retry">📷 otra foto</button><button class="b" id="ai_text">¶ texto</button><button class="b" id="ai_man">✏️ manual</button></div>';
  const pick=()=>{ const inp=document.createElement('input'); inp.type='file'; inp.accept='image/*'; inp.setAttribute('capture','environment'); inp.onchange=()=>{ if(inp.files&&inp.files[0]) labelPhoto(inp.files[0],barcode); }; inp.click(); };
  const r=document.getElementById('ai_retry'); if(r)r.onclick=pick;
  const tx=document.getElementById('ai_text'); if(tx)tx.onclick=()=>openTextParse();
  const mn=document.getElementById('ai_man'); if(mn)mn.onclick=()=>{ if(barcode)window._linkBarcode=barcode; openVerify({name:'',base:'g',per100:{},sizes:{},barcode:barcode||''},{isNew:true,tag:window._faTag||curTag()}); };
}
async function aiPhoto(file,barcode){ if(!file)return; window._faTag=window._faTag||curTag();
  openModal('<h3>analizando…</h3><div id="ai_msg" class="submeta">leyendo la etiqueta con IA…</div>');
  const msg=()=>document.getElementById('ai_msg');
  try{
    const dataUrl=await fileToDataURL(file); if(!dataUrl) throw new Error('imagen inválida');
    const ctrl=new AbortController(); const to=setTimeout(()=>ctrl.abort(),30000); let r;
    try{ r=await fetch(AI_PROXY_URL,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({image:dataUrl,barcode:barcode||''}),signal:ctrl.signal}); }
    finally{ clearTimeout(to); }
    if(!r.ok) throw new Error('servidor '+r.status);
    const j=await r.json(); if(!j||!j.ok||!j.data) throw new Error((j&&j.error)||'sin datos');
    const d=j.data; const per=sanitizePer(d.per); const found=Array.isArray(d.found)?d.found.filter(Boolean):[];
    if(!(found.length||per.kcal||per.protein||per.carbs||per.fat)){ labelFallback(msg(),barcode,'la IA no encontró valores en esa foto. Acerca la tabla, de frente y con buena luz.'); return; }
    const basis=d.basis||'serving';
    const food=normalizeExtract({name:d.name,basis:basis,serving:d.serving,serving_g:d.serving_g,serving_label:d.serving_label,piece_g:d.piece_g,pieces_per_container:d.pieces_per_container,container_g:d.container_g,servings_per_container:d.servings_per_container,per:per});
    food.barcode=barcode||'';
    const summary='IA leyó '+(found.length||'varios')+' campos'+(d.serving?' · porción: '+d.serving:'')+(basis!=='serving'?' · base impresa: '+basis:'')+(found.length?('\ncampos: '+found.join(', ')):'')+'.\nahora se guarda por 100 '+food.base+' · revisa los números.';
    openVerify(food,{isNew:true,tag:window._faTag,ocrText:summary});
  }catch(e){ labelFallback(msg(),barcode,(e&&e.name==='AbortError')?'tardó demasiado · reintenta':('no se pudo analizar ('+((e&&e.message)||'error')+')')); }
}
// Pick AI when the proxy is configured, else on-device OCR.
function labelPhoto(file,barcode){ if(AI_PROXY_URL) return aiPhoto(file,barcode); return ocrPhoto(file,barcode); }
db=load(); try{ const _sp=new URLSearchParams(location.search); if(_sp.has('steps')){ const _n=parseInt(_sp.get('steps'),10); if(!isNaN(_n)){ db.steps=db.steps||{}; db.steps[todayISO()]=_n; } if(history.replaceState)history.replaceState(null,'',location.pathname); } }catch(_){} save(); render();
if('serviceWorker' in navigator){ window.addEventListener('load',()=>navigator.serviceWorker.register('sw.js').catch(()=>{})); }
